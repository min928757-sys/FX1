<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX KARAM ACADEMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* CSS Styling - Same as previous version for consistency */
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1c2128; --border: rgba(240, 185, 11, 0.2); }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        header { background: rgba(28, 33, 40, 0.95); backdrop-filter: blur(10px); padding: 15px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-family: 'Syncopate', sans-serif; font-size: 11px; background: linear-gradient(90deg, #f0b90b, #fff, #f0b90b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: 1px; }
        .hidden { display: none !important; }
        .video-section { padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .nav-wrapper { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
        .nav-btn { background: #2d333b; color: #888; padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); font-size: 12px; font-weight: 800; flex-shrink: 0; }
        .nav-btn.active { background: var(--gold); color: black; border-color: var(--gold); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; border: 1.5px solid var(--gold); background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .action-btn { padding: 14px; border-radius: 10px; font-weight: 800; font-size: 11px; border: none; text-transform: uppercase; }
        .quiz-trigger { background: var(--gold); color: black; }
        .lb-trigger { background: #2d333b; color: var(--gold); border: 1px solid var(--gold); }
        .grid-title { padding: 25px 15px 10px; font-size: 11px; color: var(--gold); font-weight: 800; }
        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 15px 30px; }
        .card-box { text-align: center; }
        .card-label { font-size: 8px; font-weight: 700; color: #888; margin-bottom: 6px; text-transform: uppercase; }
        .card-thumb { width: 100%; aspect-ratio: 3/4; border-radius: 8px; border: 1.2px solid var(--border); overflow: hidden; background: #161b22; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .overlay.active { display: flex; }
        .ov-header { padding: 18px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .ov-body { flex: 1; padding: 20px; overflow-y: auto; }
        .opt-item { background: #2d333b; padding: 18px; border-radius: 12px; margin-bottom: 12px; border: 1.5px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <div style="width: 40px;"></div>
        <h1>FX KARAM ACADEMY</h1>
        <div id="user-display" style="color: var(--gold); font-size: 10px; font-weight: 900;">...</div>
    </header>

    <div id="app-content" class="hidden">
        <div class="video-section">
            <div class="nav-wrapper" id="nav-tabs"></div>
            <div class="video-container">
                <iframe id="main-video" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="btn-group">
                <button class="action-btn quiz-trigger" id="quiz-btn-label" onclick="startQuiz()">✍️ QUIZ</button>
                <button class="action-btn lb-trigger" onclick="openLeaderboard()">🏆 RANKING</button>
            </div>
        </div>
        <div class="grid-title">EDUCATIONAL CARDS</div>
        <div class="chapter-grid" id="card-grid"></div>
    </div>

    <div id="quiz-ov" class="overlay"><div class="ov-header"><span id="quiz-title"></span><div onclick="closeQuiz()">EXIT</div></div><div class="ov-body"><div id="q-text"></div><div id="opt-container"></div><button id="next-btn" class="hidden" onclick="handleNext()">NEXT</button></div></div>
    <div id="lb-ov" class="overlay"><div class="ov-header"><span>RANKING</span><div onclick="closeLeaderboard()">CLOSE</div></div><div class="ov-body"><table id="lb-table"></table></div></div>
    <div id="viewer-ov" class="overlay"><div class="ov-header"><span id="viewer-title"></span><div onclick="closeViewer()">CLOSE</div></div><div class="ov-body" id="viewer-content"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, query, orderBy, limit, increment, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA5wJhY38C5GMgxjJuGDDejtIje36MvBok", authDomain: "trading-app-69b9d.firebaseapp.com", projectId: "trading-app-69b9d", storageBucket: "trading-app-69b9d.appspot.com", messagingSenderId: "573273662231", appId: "1:573273662231:web:fbbbc6876711e612190829" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let userId = tg.initDataUnsafe?.user?.id?.toString() || "Guest";
        let userName = tg.initDataUnsafe?.user?.first_name || "Trader";
        document.getElementById('user-display').innerText = "ID: " + userId;

        // UPDATED DATA FROM YOUR GITHUB IMAGES
        const studyCards = [
            { t: 'Entry Setups', i: ['Entry Setups - 1.png','Entry Setups - 2.png','Entry Setups - 3.png','Entry Setups - 4.png','Entry Setups - 5.png','Entry Setups - 6.png'] },
            { t: 'Cypher', i: ['Cypher Pattern - 1.png','Cypher Pattern - 2.png','Cypher Pattern - 3.png','Cypher Pattern - 4.png','Cypher Pattern - 5.png'] },
            { t: 'Inducement', i: ['Inducement - 10Apr26 - 1.png','Inducement - 10Apr26 - 2.png','Inducement - 10Apr26 - 3.png','Inducement - 10Apr26 - 4.png','Inducement - 10Apr26 - 5.png'] },
            { t: 'Market Mech', i: ['Market Mechanics - 1.png','Market Mechanics - 2.png','Market Mechanics - 3.png','Market Mechanics - 4.png','Market Mechanics - 5.png','Market Mechanics - 6.png'] },
            { t: 'M-Average', i: ['Moving Average - 1.png','Moving Average - 2.png','Moving Average - 3.png','Moving Average - 4.png','Moving Average - 5.png'] },
            { t: 'Equal High', i: ['Equal High - 1.png','Equal High - 2.png','Equal High - 3.png','Equal High - 4.png'] },
            { t: 'OCL', i: ['OCL - 1.png','OCL - 2.png','OCL - 3.png','OCL - 4.png'] },
            { t: 'OTE Setup', i: ['OTE Setup - 1.png','OTE Setup - 2.png','OTE Setup - 3.png','OTE Setup - 4.png'] },
            { t: 'Quasimodo', i: ['Quasimodo - 1.png','Quasimodo - 2.png','Quasimodo - 3.png','Quasimodo - 4.png'] },
            { t: 'Risk MGMT', i: ['Risk Management - 1.png','Risk Management - 2.png','Risk Management - 3.png','Risk Management - 4.png'] },
            { t: 'SMT', i: ['SMT - 1.png','SMT - 2.png','SMT - 3.png','SMT - 4.png'] },
            { t: 'Gartley', i: ['Gartley Pattern - 1.png','Gartley Pattern - 2.png','Gartley Pattern - 3.png','Gartley Pattern - 4.png','Gartley Pattern - 5.png'] }
        ];

        // Lesson & Quiz Data (Keeping 7 lessons)
        const lessonData = {
            1: { vid: "jyad4g6F8FU", quiz: [{ q: "Uptrend မှာ Previous High ကို ဖောက်ထွက်တာ ဘာလဲ?", a: ["BOS", "CHoCH"], c: 0 }] },
            // ... Add other lessons here following the same pattern
        };

        // App Start Logic
        const grid = document.getElementById('card-grid');
        studyCards.forEach((c, idx) => {
            grid.innerHTML += `<div class="card-box"><div class="card-label">${c.t}</div><div class="card-thumb" onclick="viewCard(${idx})"><img src="${c.i[0]}"></div></div>`;
        });

        const nav = document.getElementById('nav-tabs');
        for(let i=1; i<=7; i++) {
            const b = document.createElement('button');
            b.className = `nav-btn ${i==1?'active':''}`;
            b.innerText = `L-${i}`;
            b.onclick = () => loadLesson(i);
            nav.appendChild(b);
        }

        window.loadLesson = (n) => {
            document.querySelectorAll('.nav-btn').forEach((btn, idx) => btn.classList.toggle('active', idx === n-1));
            document.getElementById('main-video').src = `https://www.youtube.com/embed/${lessonData[1].vid}`; // Placeholder
        };

        window.viewCard = (idx) => {
            const c = studyCards[idx];
            document.getElementById('viewer-title').innerText = c.t;
            const cont = document.getElementById('viewer-content');
            cont.innerHTML = "";
            c.i.forEach(img => { cont.innerHTML += `<img src="${img}" style="width:100%; border-radius:10px; margin-bottom:15px; border:1px solid var(--border);">`; });
            document.getElementById('viewer-ov').classList.add('active');
        };
        window.closeViewer = () => document.getElementById('viewer-ov').classList.remove('active');

        // Security: Auth Gate with Fallback
        onSnapshot(doc(db, "users", userId), (s) => {
            if(s.exists() && s.data().is_approved) {
                document.getElementById('app-content').classList.remove('hidden');
                loadLesson(1);
            } else {
                // If not approved, show a message or keep it black
                console.log("User not approved yet.");
            }
        }, (error) => {
            console.error("Firebase Error: ", error);
            // အကယ်၍ black screen ဖြစ်နေရင် ဒီနေရာမှာ error message ပြခိုင်းလို့ရပါတယ်
        });
    </script>
</body>
</html>
