<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Karam - ICT Course</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0d1117; --border: #30363d; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; user-select: none; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .trading-page { width: 100%; max-width: 600px; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        header { text-align: center; padding: 25px; background: #161b22; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        header h1 { color: var(--gold); margin: 0; font-size: 22px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <h1>Fx Karam Academy</h1>
    </header>

    <div class="container" id="gallery">
        </div>

    <script>
        // သင့်မှာ ပုံ ၁၀ ပုံ ရှိတာမို့ ၁၀ လို့ ထည့်ထားပါတယ်
        const totalImages = 10; 
        const gallery = document.getElementById('gallery');

        for (let i = 1; i <= totalImages; i++) {
            const img = document.createElement('img');
            // ပုံတွေက အပြင်မှာပဲ ရှိနေတာမို့ images/ ထည့်စရာမလိုတော့ပါဘူး
            img.src = `${i}.jpg`; 
            img.className = 'trading-page';
            img.loading = 'lazy';
            gallery.appendChild(img);
        }

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
