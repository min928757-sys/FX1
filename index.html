        .pending { background-color: #f59e0b; color: #ffffff; }
        .hidden { display: none !important; }

        .nav-btn.active { background: var(--primary); color: #0f172a; font-weight: bold; }

        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .card-title { margin-top: 25px; font-size: 12px; color: var(--primary); font-weight: 800; text-align: left; border-left: 3px solid var(--primary); padding-left: 8px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .card-item { background: #0f172a; border-radius: 8px; overflow: hidden; border: 1px solid #334155; cursor: pointer; }
        .card-item img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
        .card-label { font-size: 8px; padding: 5px 2px; color: #94a3b8; font-weight: bold; white-space: nowrap; overflow: hidden; }

        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 2000; display: none; flex-direction: column; }
        .overlay.active { display: flex; }
        .ov-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid #334155; }
        .ov-body { flex: 1; padding: 15px; overflow-y: auto; }
        .ov-body img { width: 100%; border-radius: 10px; border: 1px solid var(--primary); margin-bottom: 15px; }

        .broker-box { margin-top: 20px; padding: 15px; border: 1px dashed var(--primary); border-radius: 10px; background: rgba(56, 189, 248, 0.05); }
        .broker-link { color: var(--primary); text-decoration: none; font-weight: bold; }

        .leaderboard-table th, .leaderboard-table td { padding: 12px; text-align: center; border-bottom: 1px solid #1e293b; font-size: 12px; }

            5: [ { q: "၁။ Top-Down Analysis ဆိုတာ ဘာလဲ?", a: ["Lower မှ Higher သို့သွားခြင်း", "Higher Timeframe မှ Lower သို့ ဆင်းခြင်း", "Chart အကုန်ဖွင့်ထားခြင်း"], correct: 1 }, { q: "၂။ Higher Timeframe (Daily) ကို ဘာအတွက် အဓိကသုံးသလဲ?", a: ["Entry Point ရှာရန်", "Market Direction (Trend) ကို သိရန်", "အရောင်းရပ်ရန်"], correct: 1 }, { q: "၃။ Lower Timeframe ကို ဘာအတွက် အဓိကသုံးသလဲ?", a: ["Direction သိရန်", "တကျိသော Entry point (Execution) အတွက်", "Trend ရှာရန်"], correct: 1 }, { q: "၄။ နိုင်ခြေအမြင့်ဆုံး Setup ဖြစ်ဖို့ ဘာလုပ်ရမလဲ?", a: ["Lower TF setup က Higher TF trend နှင့် ကိုက်ညီရမည်", "ချက်ချင်း Buy မည်", "Timeframe တစ်ခုတည်းကြည့်မည်"], correct: 0 }, { q: "၅။ Market Structure ပိုခိုင်မာသော Timeframe မှာ ဘယ်ဟာလဲ?", a: ["1-minute", "15-minute", "Daily"], correct: 2 } ],
            6: [ { q: "၁။ Trading မှာ အရေးကြီးဆုံးအချက်က ဘာလဲ?", a: ["BOS ရှာခြင်း", "Risk Management (အရင်းအနှီး စီမံခန့်ခွဲမှု)", "Indicator သုံးခြင်း"], correct: 1 }, { q: "၂။ '1% Rule' အရ အော်ဒါတစ်ခုမှာ အများဆုံး ဘယ်လောက်ရှုံးခံသင့်သလဲ?", a: ["အကောင့်တစ်ခုလုံး၏ ၅ ရာခိုင်နှုန်း", "အကောင့်တစ်ခုလုံး၏ ၁ ရာခိုင်နှုန်း", "၁၀ ရာခိုင်နှုန်း"], correct: 1 }, { q: "၃။ Risk to Reward 1:3 ဆိုတာ ဘာကို ဆိုလိုတာလဲ?", a: ["၁ ဆ ရှုံးဖို့ ပြင်ဆင်ပြီး ၃ ဆ မြတ်ဖို့ မျှော်လင့်ခြင်း", "၃ ဆ ရှုံးပြီး ၁ ဆ မြတ်ခြင်း", "အရင်းအတိုင်း ပြန်ရခြင်း"], correct: 0 }, { q: "၄။ အရှုံးတွေ ဆက်တိုက်ဖြစ်နေရင်တောင် အကောင့်မပြတ်အောင် ဘာက ကူညီမလဲ?", a: ["Lot size အကြီးကြီးရိုက်ခြင်း", "Proper Position Sizing (မှန်ကန်သော Lot size သုံးစွဲခြင်း)", "ချက်ချင်း အရောင်းရပ်ခြင်း"], correct: 1 }, { q: "၅။ Trader တစ်ယောက်၏ ပထမဆုံးတာဝန်မှာ ဘာလဲ?", a: ["အမြန်ဆုံး သူဌေးဖြစ်ရန်", "အရင်းအနှီးကို မကုန်အောင် ထိန်းသိမ်းခြင်း (Capital Preservation)", "အော်ဒါအများကြီးဖွင့်ရန်"], correct: 1 } ],
            7: [ { q: "၁။ Trading မှာ အောင်မြင်ဖို့အတွက် အရေးကြီးဆုံးက ဘာလဲ?", a: ["Indicator သစ်များ ရှာခြင်း", "Trading Psychology (စိတ်ပညာနှင့် စည်းကမ်း)", "သတင်းများ နားထောင်ခြင်း"], correct: 1 }, { q: "၂။ ရှုံးသွားတဲ့ငွေကို ချက်ချင်းပြန်ရအောင် ဇွတ်အတင်း Trading လုပ်ခြင်းကို ဘယ်လိုခေါ်သလဲ?", a: ["Swing Trading", "Revenge Trading", "Scalping"], correct: 1 }, { q: "၃။ FOMO ဆိုတာ ဘာကို ဆိုလိုတာလဲ?", a: ["အမြတ်များများယူခြင်း", "အခွင့်အရေး လက်လွတ်သွားမှာ ကြောက်ပြီး ဇွတ်ဝင်ခြင်း", "အရှုံးကို လက်ခံခြင်း"], correct: 1 }, { q: "၄။ Professional Trader တစ်ယောက်ဟာ အရှုံး (Loss) ကို ဘယ်လို မြင်သလဲ?", a: ["ကျရှုံးမှုကြီး တစ်ခုအဖြစ်", "လုပ်ငန်းကုန်ကျစရိတ် (Business Expense) တစ်ခုအဖြစ်", "အမြဲတမ်း ရှောင်လွှဲရမည့်အရာအဖြစ်"], correct: 1 }, { q: "၅။ Trading မှာ နိုင်ခြေ (Win Rate) ထက် ဘာက ပိုအရေးကြီးသလဲ?", a: ["Lot size ကြီးခြင်း", "စည်းကမ်းရှိရှိနဲ့ Plan အတိုင်း လုပ်ဆောင်ခြင်း (Discipline)", "ကံကောင်းခြင်း"], correct: 1 } ]
        };

        window.showLesson = (num) => {
            currentLesson = num;
            document.getElementById('lesson-title').innerText = "Lesson " + num + ": " + titles[num];
            document.getElementById('video-frame').src = "https://www.youtube.com/embed/" + videos[num];
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-l' + num).classList.add('active');
            document.getElementById('lesson-view').classList.remove('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('leaderboard-area').classList.add('hidden');
            document.getElementById('certificate-wrap').classList.add('hidden');
            initCards();
        };

        function initCards() {
            const grid = document.getElementById('main-card-grid'); grid.innerHTML = "";
            studyCards.forEach((c, idx) => {
                grid.innerHTML += `<div class="card-item" onclick="viewCard(${idx})"><img src="${c.i[0]}"><div class="card-label">${c.t}</div></div>`;
            });
        }

        window.viewCard = (idx) => {
            const c = studyCards[idx];
            document.getElementById('ov-title').innerText = c.t;
            const content = document.getElementById('ov-content'); content.innerHTML = "";
            c.i.forEach(img => { content.innerHTML += `<img src="${img}">`; });
            document.getElementById('card-viewer').classList.add('active');
        };

        window.closeViewer = () => document.getElementById('card-viewer').classList.remove('active');

        window.startQuiz = () => {
            qIdx = 0; qScore = 0;
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('question-container').classList.remove('hidden');
            loadQ();
        };

        function loadQ() {
            const data = questions[currentLesson][qIdx];
            document.getElementById('quiz-header').innerText = "Quiz: " + titles[currentLesson];
            document.getElementById('question-text').innerText = data.q;
            const list = document.getElementById('options-list'); list.innerHTML = "";
            document.getElementById('next-btn').classList.add('hidden');
            data.a.forEach((opt, i) => {
                const b = document.createElement('button'); b.className = "quiz-option"; b.innerText = opt;
                b.onclick = () => {
                    const allOptions = document.querySelectorAll('.quiz-option');
                    allOptions.forEach(btn => btn.onclick = null); // Disable clicking after selection
                    
                    if (i === data.correct) {
                        b.classList.add('correct');
                        qScore++;
                    } else {
                        b.classList.add('wrong');
                        // Highlight the correct one
                        allOptions[data.correct].classList.add('correct');
                    }
                    document.getElementById('next-btn').classList.remove('hidden');
                };
                list.appendChild(b);
            });
        }

        window.nextQuestion = () => {
            qIdx++;
            if (qIdx < 5) loadQ();
            else {
                userScores[currentLesson] = qScore;
                document.getElementById('question-container').classList.add('hidden');
                document.getElementById('quiz-result').classList.remove('hidden');
                document.getElementById('current-score-text').innerText = "Score: " + qScore + " / 5";
                if (currentLesson === 7) {
                    document.getElementById('final-cert-btn').classList.remove('hidden');
                    saveFinalScore();
                }
            }
        };

        async function saveFinalScore() {
            let total = 0; for(let k in userScores) total += userScores[k];
            if (myUserId !== "Guest") {
                await setDoc(doc(db, "users", myUserId), { total_score: total, last_updated: new Date() }, { merge: true });
            }
        }

        window.showLeaderboard = async () => {
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('certificate-wrap').classList.add('hidden');
            document.getElementById('leaderboard-area').classList.remove('hidden');
            const q = query(collection(db, "users"), orderBy("total_score", "desc"), limit(10));
            const snap = await getDocs(q);
            const tbody = document.getElementById('leaderboard-body'); tbody.innerHTML = "";
            let rank = 1;
            snap.forEach(docSnap => {
                const data = docSnap.data();
                if(data.total_score !== undefined) {
                    const row = document.createElement('tr');
                    if(docSnap.id === myUserId) row.className = "my-rank-row";
                    row.innerHTML = `<td>${rank}</td><td>${docSnap.id.slice(0, -3) + "***"}</td><td>${data.total_score}</td>`;
                    tbody.appendChild(row);
                    rank++;
                }
            });
        };

        window.generateCertificate = () => {
            let total = 0; for(let k in userScores) total += userScores[k];
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('certificate-wrap').classList.remove('hidden');
            document.getElementById('cert-user-id').innerText = myUserId;
            document.getElementById('cert-total-score').innerText = "Total Score: " + total + " / 35";
        };

        window.backToLessons = () => showLesson(currentLesson);

        if (myUserId !== "Guest") {
            onSnapshot(doc(db, "users", myUserId), (docSnap) => {
                if (docSnap.exists() && docSnap.data().is_approved === true) {
                    document.getElementById('locked-section').classList.add('hidden');
                    document.getElementById('unlocked-section').classList.remove('hidden');
                    showLesson(1);
                }
            });
        }
    </script>
</body>
</html>
