<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX KARAM EDUCATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card-bg: #1c2128; --border: rgba(240, 185, 11, 0.25); --text-gray: #9ca3af; }
        body { background-color: var(--bg); color: #e5e7eb; font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; }
        header { background: #1c2128; padding: 16px; text-align: center; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        header h1 { color: var(--gold); margin: 0; font-size: 15px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'Poppins'; }
        
        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 12px; padding: 25px 15px; }
        .section-box { display: flex; flex-direction: column; align-items: center; }
        .section-label { font-size: 8px; font-weight: 700; color: var(--gold); margin-bottom: 10px; text-align: center; text-transform: uppercase; height: 20px; }

        .stack { position: relative; width: 100%; aspect-ratio: 3/4; cursor: pointer; }
        .card { position: absolute; width: 100%; height: 100%; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Stack Layers */
        .card:nth-child(1) { z-index: 3; transform: translate(0, 0); }
        .card:nth-child(2) { z-index: 2; transform: translate(4px, -4px); opacity: 0.7; }
        .card:nth-child(3) { z-index: 1; transform: translate(8px, -8px); opacity: 0.4; }

        /* Viewer Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 14, 17, 0.98); z-index: 2000; display: none; flex-direction: column; }
        .overlay.active { display: flex; }
        .overlay-header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
        .close-btn { color: var(--gold); font-weight: 600; font-size: 12px; cursor: pointer; padding: 5px; }
        .viewer-scroll { padding: 15px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; scroll-behavior: smooth; }
        .expanded-img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }
        
        footer { text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer-brand { color: var(--gold); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-family: 'Poppins'; }
    </style>
</head>
<body>

    <header><h1>FX KARAM EDUCATION</h1></header>

    <div class="chapter-grid" id="main-grid"></div>

    <div id="viewer" class="overlay">
        <div class="overlay-header">
            <span id="module-title" style="color:white; font-size:11px; font-weight:600; text-transform:uppercase;">LEARNING MODULE</span>
            <div class="close-btn" onclick="closeChapter()">CLOSE [X]</div>
        </div>
        <div class="viewer-scroll" id="viewer-content"></div>
    </div>

    <footer><div class="footer-brand">FX KARAM EDUCATION</div></footer>

    <script>
        // Weekly ကို ဖယ်ရှားပြီး ကျန်ရှိနေသော သင်ခန်းစာများ
        const lessons = [
            { title: 'Entry Setups', images: ['Entry Setups - 1.png', 'Entry Setups - 2.png', 'Entry Setups - 3.png', 'Entry Setups - 4.png', 'Entry Setups - 5.png', 'Entry Setups - 6.png'] },
            { title: 'Cypher', images: ['Cypher Pattern - 1.png', 'Cypher Pattern - 2.png', 'Cypher Pattern - 3.png', 'Cypher Pattern - 4.png', 'Cypher Pattern - 5.png'] },
            { title: 'Gartley', images: ['Gartley Pattern - 1.png', 'Gartley Pattern - 2.png', 'Gartley Pattern - 3.png', 'Gartley Pattern - 4.png', 'Gartley Pattern - 5.png'] },
            { title: 'Inducement', images: ['Inducement - 10Apr26 - 1.png', 'Inducement - 10Apr26 - 2.png', 'Inducement - 10Apr26 - 3.png', 'Inducement - 10Apr26 - 4.png', 'Inducement - 10Apr26 - 5.png'] },
            { title: 'OCL', images: ['OCL - 1.png', 'OCL - 2.png', 'OCL - 3.png', 'OCL - 4.png'] },
            { title: 'SMT', images: ['SMT - 1.png', 'SMT - 2.png', 'SMT - 3.png', 'SMT - 4.png'] }
        ];

        const grid = document.getElementById('main-grid');

        lessons.forEach((lesson, index) => {
            const box = document.createElement('div');
            box.className = 'section-box';
            box.innerHTML = `
                <div class="section-label">${lesson.title}</div>
                <div class="stack" onclick="openChapter(${index})">
                    <div class="card"><img src="${lesson.images[0]}"></div>
                    <div class="card"><img src="${lesson.images[1] || lesson.images[0]}"></div>
                    <div class="card"><img src="${lesson.images[2] || lesson.images[0]}"></div>
                </div>
            `;
            grid.appendChild(box);
        });

        function openChapter(index) {
            const lesson = lessons[index];
            const content = document.getElementById('viewer-content');
            document.getElementById('module-title').innerText = lesson.title + " MODULE";
            content.innerHTML = '';
            
            lesson.images.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = 'expanded-img';
                content.appendChild(img);
            });
            
            document.getElementById('viewer').classList.add('active');
            content.scrollTop = 0; // အမြဲတမ်း ပထမဆုံးပုံကနေ စပြရန်
            document.body.style.overflow = 'hidden';
        }

        function closeChapter() {
            document.getElementById('viewer').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
