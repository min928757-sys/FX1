<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX KARAM ACADEMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --gold: #f0b90b; 
            --gold-glow: rgba(240, 185, 11, 0.6);
            --bg: #0b0e11; 
            --glass: rgba(28, 33, 40, 0.7);
            --border: rgba(240, 185, 11, 0.2); 
            --gradient: linear-gradient(90deg, #f0b90b, #fff, #f0b90b);
        }

        body { 
            background-color: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; user-select: none;
            background-image: radial-gradient(circle at 50% -20%, #1c2128, #0b0e11);
        }

        header { 
            background: rgba(28, 33, 40, 0.85); backdrop-filter: blur(10px);
            padding: 20px; text-align: center; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Gradient & Special Font Title */
        header h1 { 
            font-family: 'Syncopate', sans-serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            filter: drop-shadow(0 0 5px var(--gold-glow));
            flex-grow: 1; margin: 0;
        }

        #music-btn {
            background: var(--glass); border: 1px solid var(--gold);
            color: var(--gold); border-radius: 50%; width: 38px; height: 38px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: 0.3s; box-shadow: 0 0 10px var(--border);
        }
        #music-btn.playing { animation: pulse 2s infinite; border-color: #fff; color: #fff; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(240, 185, 11, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(240, 185, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(240, 185, 11, 0); } }

        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 25px 12px; }

        .section-box { 
            background: var(--glass); backdrop-filter: blur(5px);
            border: 1px solid var(--border); border-radius: 12px; padding: 10px;
            transition: 0.3s ease; text-align: center;
        }
        .section-box:active { transform: scale(0.95); border-color: var(--gold); }

        .section-label { font-size: 8px; font-weight: 700; color: var(--gold); margin-bottom: 8px; letter-spacing: 0.5px; height: 18px; overflow: hidden; text-transform: uppercase; }

        .stack { position: relative; width: 100%; aspect-ratio: 3/4; }
        .card { position: absolute; width: 100%; height: 100%; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card:nth-child(1) { z-index: 3; }
        .card:nth-child(2) { z-index: 2; transform: translate(3px, 3px); opacity: 0.5; }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(11, 14, 17, 0.98); z-index: 2000; 
            display: none; flex-direction: column; backdrop-filter: blur(15px);
        }
        .overlay.active { display: flex; }
        .overlay-header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .close-btn { color: var(--gold); font-size: 12px; font-weight: 700; cursor: pointer; }
        .viewer-scroll { padding: 15px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .expanded-img { width: 100%; border-radius: 10px; border: 1px solid var(--border); }

        #youtube-player { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--border); font-size: 11px; color: var(--gold); opacity: 0.8; font-weight: 600; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <div style="width: 38px;"></div>
        <h1>FX KARAM ACADEMY</h1>
        <button id="music-btn" onclick="handleMusicClick()">🎵</button>
    </header>

    <div class="chapter-grid" id="main-grid"></div>

    <div id="viewer" class="overlay">
        <div class="overlay-header">
            <span id="module-title" style="color:white; font-size:11px; font-weight:600;">MODULE</span>
            <div class="close-btn" onclick="closeChapter()">CLOSE [X]</div>
        </div>
        <div class="viewer-scroll" id="viewer-content"></div>
    </div>

    <div id="youtube-player"></div>

    <footer>FX KARAM EDUCATION</footer>

    <script>
        const lessons = [
            { title: 'Entry Setups', images: ['Entry Setups - 1.png', 'Entry Setups - 2.png', 'Entry Setups - 3.png', 'Entry Setups - 4.png', 'Entry Setups - 5.png', 'Entry Setups - 6.png'] },
            { title: 'Cypher', images: ['Cypher Pattern - 1.png', 'Cypher Pattern - 2.png', 'Cypher Pattern - 3.png', 'Cypher Pattern - 4.png', 'Cypher Pattern - 5.png'] },
            { title: 'Gartley', images: ['Gartley Pattern - 1.png', 'Gartley Pattern - 2.png', 'Gartley Pattern - 3.png', 'Gartley Pattern - 4.png', 'Gartley Pattern - 5.png'] },
            { title: 'Inducement', images: ['Inducement - 10Apr26 - 1.png', 'Inducement - 10Apr26 - 2.png', 'Inducement - 10Apr26 - 3.png', 'Inducement - 10Apr26 - 4.png', 'Inducement - 10Apr26 - 5.png'] },
            { title: 'OCL', images: ['OCL - 1.png', 'OCL - 2.png', 'OCL - 3.png', 'OCL - 4.png'] },
            { title: 'SMT', images: ['SMT - 1.png', 'SMT - 2.png', 'SMT - 3.png', 'SMT - 4.png'] },
            { title: 'Market Mech', prefix: 'Market Mechanics', count: 6 },
            { title: 'Quasimodo', prefix: 'Quasimodo', count: 4 },
            { title: 'OTE Setup', prefix: 'OTE Setup', count: 4 },
            { title: 'Equal High', prefix: 'Equal High', count: 4 },
            // New Modules added from your request
            { title: 'Risk Management', prefix: 'Risk Management', count: 4 },
            { title: 'Moving Average', prefix: 'Moving Average', count: 5 }
        ];

        const finalLessons = lessons.map(lesson => {
            if (lesson.prefix && lesson.count) {
                const images = [];
                for (let i = 1; i <= lesson.count; i++) {
                    images.push(`${lesson.prefix} - ${i}.png`);
                }
                return { title: lesson.title, images: images };
            }
            return lesson;
        });

        const grid = document.getElementById('main-grid');
        finalLessons.forEach((lesson, index) => {
            const box = document.createElement('div');
            box.className = 'section-box';
            box.innerHTML = `
                <div class="section-label">${lesson.title}</div>
                <div class="stack" onclick="openChapter(${index})">
                    <div class="card"><img src="${lesson.images[0]}"></div>
                    <div class="card"><img src="${lesson.images[1] || lesson.images[0]}"></div>
                </div>
            `;
            grid.appendChild(box);
        });

        function openChapter(index) {
            const lesson = finalLessons[index];
            const content = document.getElementById('viewer-content');
            document.getElementById('module-title').innerText = lesson.title.toUpperCase();
            content.innerHTML = '';
            lesson.images.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = 'expanded-img';
                content.appendChild(img);
            });
            document.getElementById('viewer').classList.add('active');
            content.scrollTop = 0;
            document.body.style.overflow = 'hidden';
        }

        function closeChapter() {
            document.getElementById('viewer').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        var player;
        var isPlaying = false;
        
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0', videoId: 'WSSIIC58Fsc',
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'WSSIIC58Fsc' }
            });
        }

        function handleMusicClick() {
            const btn = document.getElementById('music-btn');
            if (!isPlaying) {
                if(player && player.playVideo) player.playVideo();
                btn.innerText = "⏸"; btn.classList.add('playing');
                isPlaying = true;
            } else {
                if(player && player.pauseVideo) player.pauseVideo();
                btn.innerText = "🎵"; btn.classList.remove('playing');
                isPlaying = false;
            }
        }
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
