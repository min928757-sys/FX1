<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Trading Psychology Deep Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Noto Sans Myanmar',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
margin:0;
color:white;
}

.musicBtn{
position:absolute;
top:20px;
right:20px;
background:rgba(255,255,255,0.15);
border:none;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
color:white;
backdrop-filter:blur(10px);
}

.cardContainer{
perspective:1200px;
}

.card{
width:380px;
height:280px;
position:relative;
transform-style:preserve-3d;
transition:transform .7s;
}

.card.flip{
transform:rotateY(180deg);
}

.side{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
background:rgba(255,255,255,0.1);
border-radius:22px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
backdrop-filter:blur(12px);
}

.back{
transform:rotateY(180deg);
}

.question{
font-size:20px;
margin-bottom:20px;
line-height:1.4;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.answers button{
background:linear-gradient(45deg,#00c6ff,#0072ff);
border:none;
padding:12px;
border-radius:12px;
color:white;
font-size:14px;
cursor:pointer;
transition:.2s;
}

.answers button:hover{
transform:scale(1.05);
}

.result{
font-size:18px;
margin-top:20px;
text-align:center;
}

.nextBtn{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:12px;
background:#00ffb3;
font-weight:bold;
cursor:pointer;
}

footer{
position:absolute;
bottom:10px;
opacity:.8;
}

</style>
</head>

<body>

<button class="musicBtn" onclick="toggleMusic()">🎵 Music</button>

<div class="cardContainer">

<div class="card" id="card">

<div class="side front">
<div class="question" id="question">
Flash Card ကို Tap လုပ်ပြီး Trading Psychology Quiz စပါ
</div>
<div class="answers" id="answers"></div>
</div>

<div class="side back">
<div class="result" id="result"></div>
<button class="nextBtn" onclick="nextQuestion()">Next</button>
</div>

</div>

</div>

<footer>
📢 Telegram — @fxkaram
</footer>

<audio id="tap" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="correct" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8a2bce3c1.mp3">
</audio>

<script>

const quiz=[

{
q:"Loss တစ်ခုပြီးတိုင်း revenge trade လုပ်ချင်လာတာဟာ ဘာကိုပြသသလဲ?",
a:["စိတ်ရှည်မှု","Emotion control မရှိခြင်း","Discipline","Professional mindset"],
c:1
},

{
q:"Trader တစ်ယောက်အတွက် အကြီးဆုံး enemy ကဘာလဲ?",
a:["Market maker","Fear & Greed","News","Spread"],
c:1
},

{
q:"Stop loss မတင်ပဲ trade ဝင်တာဟာဘာလဲ?",
a:["Hope trading","Confidence","Smart entry","Precision"],
c:0
},

{
q:"Winning streak ပြီး lot size တိုးချင်လာတာဟာဘာလဲ?",
a:["Confidence","Overconfidence","Discipline","Logic"],
c:1
},

{
q:"Trade plan မရှိဘဲ entry ဝင်ခြင်းကိုဘာခေါ်လဲ?",
a:["Impulse trading","Calculated trading","Smart money","Institutional entry"],
c:0
},

{
q:"Loss ကို accept မလုပ်နိုင်ခြင်းကဘာဖြစ်စေသလဲ?",
a:["Account growth","Revenge trading","Precision","Calm"],
c:1
},

{
q:"Trade မရှိတဲ့နေ့ patience ထိန်းနိုင်ခြင်းဟာဘာလဲ?",
a:["Weakness","Professional discipline","Fear","Random thinking"],
c:1
},

{
q:"Market ကို prove လုပ်ချင်တဲ့စိတ်ကဘာဖြစ်စေသလဲ?",
a:["Objectivity","Ego trading","Focus","Calm mind"],
c:1
},

{
q:"Consistent trader ဖြစ်ဖို့အရေးကြီးဆုံးအရာကဘာလဲ?",
a:["Indicators","Mind discipline","Signal group","News"],
c:1
},

{
q:"Trading psychology master ဖြစ်ဖို့အရေးကြီးဆုံး skill?",
a:["Mind control","Indicators","Broker","Spread"],
c:0
}

]

let i=0
let score=0
let started=false

const card=document.getElementById("card")
const q=document.getElementById("question")
const ans=document.getElementById("answers")
const res=document.getElementById("result")

card.onclick=function(){

if(!started){
started=true
loadQuestion()
}

}

function loadQuestion(){

document.getElementById("tap").play()

q.innerText=quiz[i].q

ans.innerHTML=""

quiz[i].a.forEach((choice,index)=>{

let btn=document.createElement("button")

btn.innerText=choice

btn.onclick=()=>selectAnswer(index)

ans.appendChild(btn)

})

}

function selectAnswer(x){

card.classList.add("flip")

if(x===quiz[i].c){

score++
res.innerHTML="✅ မှန်ပါတယ်"

document.getElementById("correct").play()

}else{

res.innerHTML="❌ မှားပါတယ်<br><br>အဖြေမှန် → "+quiz[i].a[quiz[i].c]

document.getElementById("wrong").play()

}

}

function nextQuestion(){

card.classList.remove("flip")

i++

if(i<quiz.length){

loadQuestion()

}else{

showResult()

}

}

function showResult(){

let personality=""

if(score<=3){

personality="😵 Emotional Trader<br><br>Fear & Revenge Trading ကိုထိန်းဖို့လိုပါတယ်"

}else if(score<=6){

personality="⚖ Developing Trader<br><br>Mind discipline တိုးလာနေပါတယ်"

}else if(score<=8){

personality="🧠 Smart Trader<br><br>Professional psychology နီးပါးရှိပါတယ်"

}else{

personality="👑 Elite Trader Mindset<br><br>Institutional level psychology 🔥"

}

q.innerHTML="Total Score: "+score+"/10"

ans.innerHTML=""

res.innerHTML=personality

}

function toggleMusic(){

let m=document.getElementById("music")

if(m.paused){

m.play()

}else{

m.pause()

}

}

</script>

</body>
</html>
