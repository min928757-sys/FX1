<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX KARAM ACADEMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --border: rgba(240, 185, 11, 0.2); }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; }
        header { background: rgba(28, 33, 40, 0.85); backdrop-filter: blur(10px); padding: 12px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-family: 'Syncopate', sans-serif; font-size: 10px; background: linear-gradient(90deg, #f0b90b, #fff, #f0b90b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .hidden { display: none !important; }
        .video-module { padding: 12px; background: rgba(28,33,40,0.5); border-bottom: 1px solid var(--border); }
        .nav-container { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
        .nav-btn { background: #1c2128; color: #888; padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border); font-size: 10px; font-weight: bold; }
        .nav-btn.active { background: var(--gold); color: black; border-color: var(--gold); }
        .video-wrapper { width: 95%; max-width: 500px; margin: 0 auto 10px auto; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--gold); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .action-btns { display: flex; flex-direction: column; gap: 8px; max-width: 500px; margin: 0 auto; }
        .quiz-btn { background: linear-gradient(45deg, #f0b90b, #d4a017); color: black; padding: 12px; border-radius: 6px; font-weight: 800; font-size: 11px; border: none; cursor: pointer; text-transform: uppercase; }
        .lb-toggle-btn { background: #2d333b; color: var(--gold); padding: 10px; border-radius: 6px; font-weight: 700; font-size: 10px; border: 1px solid var(--gold); cursor: pointer; }
        .leaderboard-container { margin: 15px auto; max-width: 500px; background: #161b22; border-radius: 8px; border: 1px solid var(--border); display: none; }
        .leaderboard-container.active { display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #21262d; color: var(--gold); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px 15px; }
        .section-box { text-align: center; }
        .section-label { font-size: 8px; font-weight: 700; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; }
        .stack { position: relative; width: 100%; aspect-ratio: 3/4; cursor: pointer; border: 1.5px solid var(--gold); border-radius: 5px; overflow: hidden; }
        .stack img { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .overlay.active { display: flex; }
        .overlay-header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); background: #1c2128; }
        .quiz-body { padding: 25px; text-align: center; }
        .opt-btn { background: #2d333b; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer; text-align: left; font-size: 14px; }
        .opt-btn.correct { background: #059669 !important; border-color: #34d399; }
        .opt-btn.wrong { background: #dc2626 !important; border-color: #f87171; }
        .next-btn { margin-top: 20px; background: var(--gold); color: black; border: none; padding: 14px; border-radius: 8px; font-weight: 700; width: 100%; display: none; }
    </style>
</head>
<body>

    <header>
        <div style="width: 40px;"></div>
        <h1>FX KARAM ACADEMY</h1>
        <div id="user-id-display" style="color: var(--gold); font-size: 9px; font-weight: bold;">...</div>
    </header>

    <div id="unlocked-section" class="hidden">
        <div class="video-module">
            <div class="nav-container">
                <button class="nav-btn active" id="btn-l1" onclick="showLesson(1)">L-1</button>
                <button class="nav-btn" id="btn-l2" onclick="showLesson(2)">L-2</button>
                <button class="nav-btn" id="btn-l3" onclick="showLesson(3)">L-3</button>
                <button class="nav-btn" id="btn-l4" onclick="showLesson(4)">L-4</button>
                <button class="nav-btn" id="btn-l5" onclick="showLesson(5)">L-5</button>
                <button class="nav-btn" id="btn-l6" onclick="showLesson(6)">L-6</button>
                <button class="nav-btn" id="btn-l7" onclick="showLesson(7)">L-7</button>
            </div>
            <div class="video-wrapper">
                <div class="video-container">
                    <iframe id="video-frame" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
            <div class="action-btns">
                <button class="quiz-btn" id="dynamic-quiz-btn" onclick="openQuiz()">✍️ LESSON 1 QUIZ</button>
                <button class="lb-toggle-btn" onclick="toggleLeaderboard()">🏆 SHOW LEADERBOARD</button>
            </div>
            <div id="leaderboard-ui" class="leaderboard-container">
                <table>
                    <thead><tr><th style="width:40px">#</th><th>TRADER</th><th style="text-align:right">POINTS</th></tr></thead>
                    <tbody id="lb-table-body"></tbody>
                </table>
            </div>
        </div>
        <div class="chapter-grid" id="main-grid"></div>
    </div>

    <div id="quiz-overlay" class="overlay">
        <div class="overlay-header">
            <span id="quiz-header-title" style="color:var(--gold); font-weight:700; font-size: 11px;"></span>
            <div style="color: #ff4d4d; cursor: pointer; font-size: 11px; font-weight:bold" onclick="closeQuiz()">[ EXIT ]</div>
        </div>
        <div class="quiz-body">
            <div id="question-text" style="font-size: 18px; margin-bottom: 20px; text-align: left;"></div>
            <div id="options-container" style="display: flex; flex-direction: column;"></div>
            <div id="feedback-text" style="margin-top: 15px; font-weight: bold;"></div>
            <button id="next-btn" class="next-btn" onclick="nextQuestion()">NEXT QUESTION</button>
        </div>
    </div>

    <div id="viewer" class="overlay">
        <div class="overlay-header">
            <span id="module-title" style="color:white; font-size:11px; font-weight:700;"></span>
            <div style="color: var(--gold); cursor: pointer;" onclick="closeChapter()">[ CLOSE ]</div>
        </div>
        <div class="viewer-scroll" id="viewer-content" style="padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, query, orderBy, limit, increment, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA5wJhY38C5GMgxjJuGDDejtIje36MvBok", authDomain: "trading-app-69b9d.firebaseapp.com", projectId: "trading-app-69b9d", storageBucket: "trading-app-69b9d.appspot.com", messagingSenderId: "573273662231", appId: "1:573273662231:web:fbbbc6876711e612190829" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let myUserId = tg.initDataUnsafe?.user?.id?.toString() || "Guest";
        let myName = tg.initDataUnsafe?.user?.first_name || "Trader";
        document.getElementById('user-id-display').innerText = "ID: " + myUserId;

        const videos = { 1:"jyad4g6F8FU", 2:"DDLsFro2bpc", 3:"DwP9zFAC5EA", 4:"L_zlR6ZxXNg", 5:"GoRcLqAsYUg", 6:"n7owfWxBxmw", 7:"nYuowB5Wyts" };
        let currentLesson = 1;
        let currentQIndex = 0;
        let answered = false;

        const allQuizzes = {
            1: [ { q: "၁။ Uptrend မှာ Previous High ကို ဖောက်ထွက်သွားတာကို ဘယ်လိုခေါ်သလဲ?", a: ["BOS", "CHoCH", "Liquidity"], correct: 0 }, { q: "၂။ Downtrend တစ်ခုမှာ ဘယ်လို Structure မျိုးရှိသလဲ?", a: ["HH & HL", "LH & LL", "Equal High"], correct: 1 } ],
            2: [ { q: "၁။ Order Block ဆိုတာ ဘာလဲ?", a: ["အရောင်တူ Candle များ", "နောက်ဆုံးဖြစ်ပေါ်ခဲ့တဲ့ ဆန့်ကျင်ဘက် Candle", "Market Gap"], correct: 1 }, { q: "၂။ Bullish Order Block ကို ဘယ်နေရာမှာ ရှာရမလဲ?", a: ["ဈေးမတက်ခင် နောက်ဆုံးကျခဲ့တဲ့ အနီရောင် Candle", "ဈေးမကျခင် နောက်ဆုံးတက်ခဲ့တဲ့ အစိမ်းရောင် Candle", "Chart ရဲ့ အလယ်"], correct: 0 } ]
            // Add other quizzes similarly...
        };

        const cardLessons = [
            { title: 'Entry Setups', images: ['Entry Setups - 1.png', 'Entry Setups - 2.png'] },
            { title: 'Cypher', images: ['Cypher Pattern - 1.png', 'Cypher Pattern - 2.png'] },
            { title: 'Inducement', images: ['Inducement - 10Apr26 - 1.png', 'Inducement - 10Apr26 - 2.png'] },
            { title: 'Market Mech', images: ['Market Mechanics - 1.png', 'Market Mechanics - 2.png'] },
            { title: 'M-Average', images: ['Moving Average - 1.png', 'Moving Average - 2.png'] },
            { title: 'Equal High', images: ['Equal High - 1.png', 'Equal High - 2.png'] }
        ];

        const grid = document.getElementById('main-grid');
        cardLessons.forEach((lesson, idx) => {
            const box = document.createElement('div');
            box.className = 'section-box';
            box.innerHTML = `<div class="section-label">${lesson.title}</div><div class="stack" onclick="openChapter(${idx})"><img src="${lesson.images[0]}"></div>`;
            grid.appendChild(box);
        });

        window.openChapter = (idx) => {
            const data = cardLessons[idx];
            document.getElementById('module-title').innerText = data.title;
            const content = document.getElementById('viewer-content');
            content.innerHTML = "";
            data.images.forEach(img => { content.innerHTML += `<img src="${img}" style="width:100%; border-radius:5px; border:1px solid var(--border);">`; });
            document.getElementById('viewer').classList.add('active');
        };
        window.closeChapter = () => document.getElementById('viewer').classList.remove('active');

        window.showLesson = (num) => {
            currentLesson = parseInt(num);
            document.getElementById('video-frame').src = "https://www.youtube.com/embed/" + videos[num];
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-l' + num).classList.add('active');
            document.getElementById('dynamic-quiz-btn').innerText = `✍️ LESSON ${num} QUIZ`;
        };

        window.openQuiz = () => { currentQIndex = 0; loadQuestion(); document.getElementById('quiz-overlay').classList.add('active'); };

        function loadQuestion() {
            answered = false;
            const data = allQuizzes[currentLesson][currentQIndex];
            document.getElementById('quiz-header-title').innerText = `LESSON ${currentLesson} QUIZ (${currentQIndex+1})`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('feedback-text').innerText = "";
            document.getElementById('next-btn').style.display = "none";
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            data.a.forEach((opt, idx) => {
                const b = document.createElement('div');
                b.className = 'opt-btn'; b.innerText = opt;
                b.onclick = () => checkAnswer(idx, data.correct, b);
                container.appendChild(b);
            });
        }

        async function checkAnswer(idx, correct, btn) {
            if (answered) return;
            answered = true;
            const qKey = `L${currentLesson}_Q${currentQIndex}`;
            const userRef = doc(db, "users", myUserId);
            const userDoc = await getDoc(userRef);
            const solvedList = userDoc.data()?.solved_questions || [];
            const previouslyCorrect = solvedList.includes(qKey);

            if (idx === correct) {
                btn.classList.add('correct');
                document.getElementById('feedback-text').innerHTML = "✅ Correct!";
                if (!previouslyCorrect) await updateDoc(userRef, { score: increment(1), solved_questions: arrayUnion(qKey), name: myName });
            } else {
                btn.classList.add('wrong');
                document.querySelectorAll('.opt-btn')[correct].classList.add('correct');
                document.getElementById('feedback-text').innerHTML = "❌ Wrong!";
                if (previouslyCorrect) await updateDoc(userRef, { score: increment(-1), solved_questions: arrayRemove(qKey) });
            }
            document.getElementById('next-btn').style.display = "block";
        }

        window.nextQuestion = () => { currentQIndex++; if (currentQIndex < allQuizzes[currentLesson].length) loadQuestion(); else closeQuiz(); };
        window.closeQuiz = () => document.getElementById('quiz-overlay').classList.remove('active');

        window.toggleLeaderboard = () => {
            const lb = document.getElementById('leaderboard-ui');
            lb.classList.toggle('active');
            if(lb.classList.contains('active')) fetchLB();
        };

        function fetchLB() {
            const q = query(collection(db, "users"), orderBy("score", "desc"), limit(10));
            onSnapshot(q, (snap) => {
                const body = document.getElementById('lb-table-body');
                body.innerHTML = "";
                let i = 1;
                snap.forEach(d => {
                    const data = d.data();
                    body.innerHTML += `<tr><td>${i++}</td><td>${data.name}</td><td style="text-align:right; color:var(--gold); font-weight:bold">${data.score || 0}</td></tr>`;
                });
            });
        }

        onSnapshot(doc(db, "users", myUserId), (s) => {
            if(s.exists() && s.data().is_approved) {
                document.getElementById('unlocked-section').classList.remove('hidden');
                showLesson(1);
            }
        });
    </script>
</body>
</html>
