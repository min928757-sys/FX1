<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Psychology Deep Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --correct: #4CAF50;
            --wrong: #FF5252;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        /* Music Controls */
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn-music {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* Quiz Container */
        .quiz-container {
            width: 90%;
            max-width: 600px;
            perspective: 1000px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .card.flip {
            transform: rotateY(10deg) scale(1.02);
        }

        h2 { font-size: 1.5rem; margin-bottom: 30px; line-height: 1.6; }

        .options-container {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            flex: 1;
            transition: 0.3s;
            font-weight: bold;
        }

        .option-btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* Results Display */
        .feedback {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 24px;
        }

        .score-board { display: none; text-align: center; }
        .advice { font-style: italic; color: #ddd; margin-top: 15px; }

        /* Footer */
        footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
        }

        footer a {
            color: #0088cc;
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .wrong-anim { animation: shake 0.4s; background: var(--wrong) !important; }
        .correct-anim { background: var(--correct) !important; }

    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-music" onclick="toggleMusic()">
            <i id="music-icon" class="fas fa-volume-mute"></i> Music
        </button>
    </div>

    <div class="quiz-container">
        <div class="card" id="quiz-card">
            <div id="quiz-content">
                <div id="question-number" style="font-size: 0.9rem; opacity: 0.7;">Question 1/10</div>
                <h2 id="question-text">Trading မှာ အရှုံးပေါ်တဲ့အခါ သင့်စိတ်ထဲမှာ အဓိက ဘယ်လိုခံစားရသလဲ?</h2>
                <div class="options-container" id="options">
                    <button class="option-btn" onclick="checkAnswer(0)">A</button>
                    <button class="option-btn" onclick="checkAnswer(1)">B</button>
                    <button class="option-btn" onclick="checkAnswer(2)">C</button>
                    <button class="option-btn" onclick="checkAnswer(3)">D</button>
                </div>
                <div class="feedback" id="feedback-text"></div>
            </div>

            <div id="result-content" class="score-board">
                <h2>Quiz ပြီးဆုံးပါပြီ!</h2>
                <div style="font-size: 3rem;" id="final-score">0/10</div>
                <p class="advice" id="advice-text"></p>
                <button class="option-btn" style="margin-top:20px" onclick="location.reload()">ပြန်ဖြေမည်</button>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://t.me/fxkaram" target="_blank">
            <i class="fab fa-telegram"></i> @fxkaram
        </a>
    </footer>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3"></audio>
    <audio id="tap-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script>
        const quizData = [
            { q: "အရှုံးတစ်ခုဖြစ်ပြီးနောက် လက်စားချေချင်စိတ် (Revenge Trading) ဖြစ်ပေါ်ပါသလား?", a: 1, options: ["မဖြစ်ပါ", "အမြဲဖြစ်သည်", "တစ်ခါတစ်ရံ", "မသေချာပါ"] },
            { q: "Trade တစ်ခုမဖွင့်ခင် ကြောက်ရွံ့စိတ် (Fear) ကို ဘယ်လိုထိန်းချုပ်သလဲ?", a: 0, options: ["Plan အတိုင်းလုပ်သည်", "မဝင်ရဲတော့ပါ", "Lot အကြီးကြီးသုံးသည်", "သူများပြောတာနားထောင်သည်"] },
            { q: "ကိုယ့်ရဲ့ Strategy က အလုပ်မလုပ်တော့ဘူးလို့ ခံစားရရင် ဘာလုပ်မလဲ?", a: 0, options: ["Review လုပ်မည်", "ချက်ချင်းပြောင်းမည်", "Trading နားမည်", "ဒေါသထွက်မည်"] },
            { q: "အမြတ်ရနေတဲ့ Trade တစ်ခုကို စောစောပိတ်မိတတ်သလား?", a: 2, options: ["အမြဲပိတ်သည်", "မပိတ်ပါ", "ကြောက်စိတ်ကြောင့်ဖြစ်သည်", "target အထိစောင့်သည်"] },
            { q: "Trading Psychology မှာ အရေးကြီးဆုံးက ဘာလဲ?", a: 1, options: ["Indicator", "Mindset", "News", "Signal"] },
            { q: "Over-trading ဖြစ်ရခြင်းရဲ့ အဓိက အကြောင်းရင်း?", a: 0, options: ["လောဘ", "ဗဟုသုတများခြင်း", "အချိန်ပိုခြင်း", "စက်ပစ္စည်းကောင်းခြင်း"] },
            { q: "ရှုံးနေတဲ့ Trade ကို အကြာကြီး ကိုင်ထားတတ်သလား?", a: 1, options: ["မကိုင်ပါ", "မျှော်လင့်ချက်ဖြင့်ကိုင်သည်", "မေ့သွားလို့", "အမြဲလုပ်သည်"] },
            { q: "Daily Goal ပြည့်သွားရင် ဘာလုပ်သင့်သလဲ?", null: null, a: 2, options: ["ဆက်လုပ်မည်", "Lot တင်မည်", "နားလိုက်မည်", "သူငယ်ချင်းကိုပြမည်"] },
            { q: "Trading Plan မရှိဘဲ Trade လုပ်ခြင်းသည်?", a: 0, options: ["လောင်းကစား", "ရင်းနှီးမြှုပ်နှံမှု", "ကျွမ်းကျင်မှု", "ဝါသနာ"] },
            { q: "စိတ်လှုပ်ရှားနေချိန်မှာ Trade လုပ်သင့်သလား?", a: 1, options: ["လုပ်သင့်သည်", "မလုပ်သင့်ပါ", "နည်းနည်းလုပ်မည်", "မသေချာပါ"] }
        ];

        let currentIdx = 0;
        let score = 0;
        const music = document.getElementById('bg-music');
        const tapSound = document.getElementById('tap-sound');

        function toggleMusic() {
            const icon = document.getElementById('music-icon');
            if (music.paused) {
                music.play();
                icon.className = "fas fa-volume-up";
            } else {
                music.pause();
                icon.className = "fas fa-volume-mute";
            }
        }

        function checkAnswer(choice) {
            tapSound.play();
            const card = document.getElementById('quiz-card');
            const feedback = document.getElementById('feedback-text');
            const correct = quizData[currentIdx].a;

            if (choice === correct) {
                score++;
                feedback.innerText = "မှန်ကန်ပါတယ်! ✅";
                feedback.style.color = "var(--correct)";
                document.querySelectorAll('.option-btn')[choice].classList.add('correct-anim');
            } else {
                feedback.innerText = `မှားယွင်းပါတယ်။ အဖြေမှန်မှာ ${String.fromCharCode(65 + correct)} ဖြစ်ပါတယ်။ ❌`;
                feedback.style.color = "var(--wrong)";
                card.classList.add('wrong-anim');
                document.querySelectorAll('.option-btn')[choice].classList.add('wrong-anim');
            }

            setTimeout(() => {
                card.classList.remove('wrong-anim');
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('correct-anim', 'wrong-anim'));
                feedback.innerText = "";
                currentIdx++;
                if (currentIdx < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function loadQuestion() {
            document.getElementById('question-number').innerText = `Question ${currentIdx + 1}/10`;
            document.getElementById('question-text').innerText = quizData[currentIdx].q;
        }

        function showResults() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-content').style.display = 'block';
            document.getElementById('final-score').innerText = `${score}/10`;
            
            let advice = "";
            if(score >= 8) advice = "သင်ဟာ စိတ်ဓာတ်ကြံ့ခိုင်တဲ့ Trader တစ်ယောက်ပါ။ စည်းကမ်းကို ဆက်ထိန်းပါ။";
            else if(score >= 5) advice = "သင်ယူစရာတွေ ရှိပါသေးတယ်။ စိတ်ခံစားချက်ကို ထိန်းချုပ်ဖို့ လေ့ကျင့်ပါ။";
            else advice = "Trading Psychology ကို အသစ်ကနေ ပြန်လေ့လာသင့်ပါတယ်။ စိတ်ရှည်ဖို့ လိုအပ်ပါတယ်။";
            
            document.getElementById('advice-text').innerText = advice;
        }
    </script>
</body>
</html>
