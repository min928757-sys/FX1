<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Psychology Quiz - FXKARAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --correct: #4CAF50;
            --wrong: #FF5252;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        /* Music Controls */
        .controls { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .btn-music {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white; padding: 10px 15px; border-radius: 50px;
            cursor: pointer; backdrop-filter: blur(5px);
        }

        /* Quiz Card */
        .quiz-container { width: 90%; max-width: 500px; cursor: pointer; }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 40px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h2 { font-size: 1.4rem; margin-bottom: 25px; min-height: 80px; display: flex; align-items: center; justify-content: center; }

        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            opacity: 0; /* အစမှာ ဖျောက်ထားမည် */
            pointer-events: none;
            transition: 0.5s;
        }

        .show-options { opacity: 1; pointer-events: auto; }

        .option-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .option-btn:active { transform: scale(0.95); }

        /* Status colors */
        .correct { background: var(--correct) !important; border-color: #fff; }
        .wrong { background: var(--wrong) !important; border-color: #fff; }

        .feedback { margin-top: 15px; height: 25px; font-weight: bold; }

        /* Footer */
        footer { position: absolute; bottom: 30px; }
        footer a {
            color: #0088cc; text-decoration: none;
            display: flex; align-items: center; gap: 10px; font-size: 1.1rem;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-music" onclick="toggleMusic(event)">
            <i id="music-icon" class="fas fa-volume-mute"></i> Music
        </button>
    </div>

    <div class="quiz-container" onclick="revealOptions()">
        <div class="card" id="quiz-card">
            <div id="quiz-content">
                <div id="q-count" style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px;">Question 1/10</div>
                <h2 id="question-text">Loading...</h2>
                
                <div id="tap-hint" style="font-size: 0.9rem; color: #aaa;">(Card ကိုနှိပ်ပြီး အဖြေရွေးပါ)</div>

                <div class="options-grid" id="options-container">
                    <button class="option-btn" onclick="handleChoice(0, event)">A</button>
                    <button class="option-btn" onclick="handleChoice(1, event)">B</button>
                    <button class="option-btn" onclick="handleChoice(2, event)">C</button>
                    <button class="option-btn" onclick="handleChoice(3, event)">D</button>
                </div>
                <div class="feedback" id="feedback"></div>
            </div>

            <div id="result-page" style="display:none;">
                <h2>ရလဒ်</h2>
                <div id="score-display" style="font-size: 3rem; margin: 20px 0;">0/10</div>
                <p id="advice" style="font-style: italic;"></p>
                <button class="option-btn" style="margin-top: 20px; width: 100%;" onclick="location.reload()">ပြန်လည်ဖြေဆိုမည်</button>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://t.me/fxkaram" target="_blank">
            <i class="fab fa-telegram"></i> @fxkaram
        </a>
    </footer>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3"></audio>
    <audio id="tap-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script>
        const quizData = [
            { q: "Trading မှာ အရှုံးပေါ်တဲ့အခါ သင့်စိတ်ထဲမှာ အဓိက ဘယ်လိုခံစားရသလဲ?", a: 0, ops: ["Review ပြန်လုပ်တယ်", "ချက်ချင်းပြန်ဝင်တယ်", "အရမ်းဒေါသထွက်တယ်", "Trade မလုပ်တော့ဘူး"] },
            { q: "Daily Goal ပြည့်သွားရင် ဘာလုပ်သင့်သလဲ?", a: 2, ops: ["ဆက်လုပ်မည်", "Lot တင်မည်", "နားလိုက်မည်", "သူငယ်ချင်းကိုပြမည်"] },
            { q: "Revenge Trading ဆိုတာ ဘာကိုဆိုလိုတာလဲ?", a: 1, ops: ["အနိုင်ရဖို့လုပ်ခြင်း", "ရှုံးတာကိုပြန်ရအောင်ဇွတ်လုပ်ခြင်း", "စနစ်တကျ trade ခြင်း", "ဘာမှမလုပ်ခြင်း"] },
            { q: "Trade တစ်ခုမဖွင့်ခင် ဘာကိုအရင်ကြည့်ရမလဲ?", a: 0, ops: ["Risk management", "အမြတ်ဘယ်လောက်ရမလဲ", "သူများ signal", "ဘာမှမကြည့်ပါ"] },
            { q: "FOMO (Fear of Missing Out) ဆိုတာ ဘာလဲ?", a: 1, ops: ["ရှုံးမှာကြောက်ခြင်း", "အခွင့်အရေးလွတ်မှာကြောက်ခြင်း", "အမြတ်ရမှာကြောက်ခြင်း", "ဘာမှမဟုတ်ပါ"] },
            { q: "Trading မှာ 80% က ဘာလဲ?", a: 1, ops: ["Strategy", "Psychology", "News", "Luck"] },
            { q: "ရှုံးနေတဲ့ Trade တစ်ခုကို ဘယ်အချိန်ပိတ်မလဲ?", a: 0, ops: ["Stop Loss ထိတဲ့အခါ", "Account ထဲပိုက်ဆံကုန်မှ", "စိတ်ပျက်တဲ့အခါ", "မပိတ်ပါ"] },
            { q: "အမြတ်ရဖို့အတွက် အရေးကြီးဆုံးက?", a: 2, ops: ["Indicator", "ပိုက်ဆံအများကြီးရှိဖို့", "စိတ်ရှည်ဖို့", "အမြဲဝင်နေဖို့"] },
            { q: "Trade လုပ်နေရင်း စိတ်မငြိမ်ရင် ဘာလုပ်မလဲ?", a: 3, ops: ["ဆက်လုပ်မည်", "Lot လျှော့မည်", "သူများကိုမေးမည်", "ချက်ချင်းနားလိုက်မည်"] },
            { q: "Trading ကို ဘယ်လိုသဘောထားသင့်သလဲ?", a: 0, ops: ["Business တစ်ခုလို", "ထီပေါက်သလို", "ဂိမ်းတစ်ခုလို", "ဘာမှမဟုတ်ပါ"] }
        ];

        let currentIdx = 0;
        let score = 0;
        const music = document.getElementById('bg-music');
        const tapSnd = document.getElementById('tap-sound');

        function loadQ() {
            document.getElementById('q-count').innerText = `Question ${currentIdx + 1}/10`;
            document.getElementById('question-text').innerText = quizData[currentIdx].q;
            const btns = document.querySelectorAll('.option-btn');
            quizData[currentIdx].ops.forEach((text, i) => {
                btns[i].innerText = text;
                btns[i].className = 'option-btn'; 
            });
            document.getElementById('options-container').classList.remove('show-options');
            document.getElementById('tap-hint').style.display = 'block';
            document.getElementById('feedback').innerText = "";
        }

        function revealOptions() {
            document.getElementById('options-container').classList.add('show-options');
            document.getElementById('tap-hint').style.display = 'none';
        }

        function toggleMusic(e) {
            e.stopPropagation();
            const icon = document.getElementById('music-icon');
            if (music.paused) { music.play(); icon.className = "fas fa-volume-up"; }
            else { music.pause(); icon.className = "fas fa-volume-mute"; }
        }

        function handleChoice(idx, e) {
            e.stopPropagation();
            tapSnd.play();
            const correct = quizData[currentIdx].a;
            const btns = document.querySelectorAll('.option-btn');
            const card = document.getElementById('quiz-card');

            if (idx === correct) {
                score++;
                btns[idx].classList.add('correct');
                document.getElementById('feedback').innerText = "မှန်ကန်ပါတယ် ✅";
            } else {
                btns[idx].classList.add('wrong');
                btns[correct].classList.add('correct');
                card.classList.add('shake');
                document.getElementById('feedback').innerText = "မှားသွားပါတယ် ❌";
            }

            setTimeout(() => {
                card.classList.remove('shake');
                currentIdx++;
                if (currentIdx < quizData.length) loadQ();
                else showFinal();
            }, 1500);
        }

        function showFinal() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-page').style.display = 'block';
            document.getElementById('score-display').innerText = `${score}/10`;
            let advice = score > 7 ? "အကောင်းဆုံးပါပဲ! စည်းကမ်းရှိတဲ့ Trader တစ်ယောက်ဖြစ်နေပါပြီ။" : "စိတ်ဓာတ်မကျပါနဲ့၊ Psychology ကို ပိုလေ့လာပေးပါ။";
            document.getElementById('advice').innerText = advice;
        }

        loadQ();
    </script>
</body>
</html>
