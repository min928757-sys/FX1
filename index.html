<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX KARAM ACADEMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1c2128; --border: rgba(240, 185, 11, 0.2); }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { background: rgba(28, 33, 40, 0.95); padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        header h1 { font-family: 'Syncopate', sans-serif; font-size: 10px; color: var(--gold); margin: 0; letter-spacing: 1px; }
        .hidden { display: none !important; }
        .nav-wrapper { display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px; background: var(--bg); }
        .nav-btn { background: #1c2128; color: #888; padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); font-size: 11px; font-weight: 800; flex-shrink: 0; }
        .nav-btn.active { background: var(--gold); color: black; border-color: var(--gold); }
        .video-section { padding: 0 15px 15px; }
        .video-container { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; border: 1.5px solid var(--gold); background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .action-btn { padding: 14px; border-radius: 8px; font-weight: 800; font-size: 11px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .quiz-trigger { background: var(--gold); color: black; }
        .lb-trigger { background: #2d333b; color: var(--gold); border: 1px solid var(--gold); }
        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card-box { text-align: center; }
        .card-label { font-size: 8px; font-weight: 700; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .card-thumb { width: 100%; aspect-ratio: 3/4; border-radius: 6px; border: 1px solid var(--border); overflow: hidden; background: #161b22; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .overlay.active { display: flex; }
        .ov-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .opt-item { background: #2d333b; padding: 18px; border-radius: 12px; margin-bottom: 12px; border: 1.5px solid var(--border); }
        .opt-item.correct { background: #059669 !important; }
        .opt-item.wrong { background: #dc2626 !important; }
        .next-btn { background: var(--gold); color: black; padding: 16px; border-radius: 12px; width: 100%; font-weight: 800; border: none; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>FX KARAM ACADEMY</h1>
        <div id="user-display" style="color: var(--gold); font-size: 9px; font-weight: bold;">ID: Loading...</div>
    </header>

    <div id="app-content">
        <div class="nav-wrapper" id="nav-tabs"></div>
        <div class="video-section">
            <div class="video-container"><iframe id="main-video" src="" frameborder="0" allowfullscreen></iframe></div>
            <div class="btn-group">
                <button class="action-btn quiz-trigger" onclick="startQuiz()">✍️ <span id="quiz-btn-txt">QUIZ</span></button>
                <button class="action-btn lb-trigger" onclick="openLeaderboard()">🏆 RANKING</button>
            </div>
        </div>
        <div style="padding:10px 15px; font-size:10px; color:var(--gold); font-weight:800;">EDUCATIONAL CARDS</div>
        <div class="chapter-grid" id="card-grid"></div>
    </div>

    <div id="quiz-ov" class="overlay">
        <div class="ov-header"><span id="quiz-title" style="color:var(--gold); font-weight:800;"></span><div onclick="closeQuiz()" style="color:red;">EXIT</div></div>
        <div class="ov-body" style="padding:20px;">
            <div id="q-text" style="font-size:18px; margin-bottom:20px;"></div>
            <div id="opt-container"></div>
            <button id="next-btn" class="hidden next-btn" onclick="handleNext()">NEXT</button>
        </div>
    </div>

    <div id="lb-ov" class="overlay">
        <div class="ov-header"><span style="color:var(--gold); font-weight:800;">TOP TRADERS</span><div onclick="closeLeaderboard()">CLOSE</div></div>
        <div class="ov-body" id="lb-list" style="padding:20px;"></div>
    </div>

    <div id="viewer-ov" class="overlay">
        <div class="ov-header"><span id="viewer-title"></span><div onclick="closeViewer()">CLOSE</div></div>
        <div class="ov-body" id="viewer-content" style="padding:15px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, query, orderBy, limit, increment, getDoc, arrayUnion, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA5wJhY38C5GMgxjJuGDDejtIje36MvBok", authDomain: "trading-app-69b9d.firebaseapp.com", projectId: "trading-app-69b9d", storageBucket: "trading-app-69b9d.appspot.com", messagingSenderId: "573273662231", appId: "1:573273662231:web:fbbbc6876711e612190829" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let userId = tg.initDataUnsafe?.user?.id?.toString() || "Guest_User";
        let userName = tg.initDataUnsafe?.user?.first_name || "Trader";
        document.getElementById('user-display').innerText = "ID: " + userId;

        const studyCards = [
            { t: 'Entry Setups', i: ['Entry Setups - 1.png','Entry Setups - 2.png','Entry Setups - 3.png','Entry Setups - 4.png','Entry Setups - 5.png','Entry Setups - 6.png'] },
            { t: 'Cypher', i: ['Cypher Pattern - 1.png','Cypher Pattern - 2.png','Cypher Pattern - 3.png','Cypher Pattern - 4.png','Cypher Pattern - 5.png'] },
            { t: 'Inducement', i: ['Inducement - 10Apr26 - 1.png','Inducement - 10Apr26 - 2.png','Inducement - 10Apr26 - 3.png','Inducement - 10Apr26 - 4.png','Inducement - 10Apr26 - 5.png'] },
            { t: 'Market Mech', i: ['Market Mechanics - 1.png','Market Mechanics - 2.png','Market Mechanics - 3.png','Market Mechanics - 4.png','Market Mechanics - 5.png','Market Mechanics - 6.png'] },
            { t: 'M-Average', i: ['Moving Average - 1.png','Moving Average - 2.png','Moving Average - 3.png','Moving Average - 4.png','Moving Average - 5.png'] },
            { t: 'Equal High', i: ['Equal High - 1.png','Equal High - 2.png','Equal High - 3.png','Equal High - 4.png'] },
            { t: 'OCL', i: ['OCL - 1.png','OCL - 2.png','OCL - 3.png','OCL - 4.png'] },
            { t: 'OTE Setup', i: ['OTE Setup - 1.png','OTE Setup - 2.png','OTE Setup - 3.png','OTE Setup - 4.png'] },
            { t: 'Quasimodo', i: ['Quasimodo - 1.png','Quasimodo - 2.png','Quasimodo - 3.png','Quasimodo - 4.png'] },
            { t: 'Risk MGMT', i: ['Risk Management - 1.png','Risk Management - 2.png','Risk Management - 3.png','Risk Management - 4.png'] },
            { t: 'SMT', i: ['SMT - 1.png','SMT - 2.png','SMT - 3.png','SMT - 4.png'] },
            { t: 'Gartley', i: ['Gartley Pattern - 1.png','Gartley Pattern - 2.png','Gartley Pattern - 3.png','Gartley Pattern - 4.png','Gartley Pattern - 5.png'] }
        ];

        const lessonData = {
            1: { vid: "jyad4g6F8FU", quiz: [
                { q: "၁။ Uptrend မှာ Previous High ကို ဖောက်ထွက်တာ ဘာလဲ?", a: ["BOS", "CHoCH", "Liquidity"], c: 0 },
                { q: "၂။ Downtrend တစ်ခုမှာ ဘယ်လို Structure ရှိသလဲ?", a: ["HH & HL", "LH & LL", "Equal High"], c: 1 },
                { q: "၃။ Trend ပြောင်းလဲမှုကို ပထမဆုံးပြတဲ့ လက္ခဏာ?", a: ["BOS", "CHoCH", "Order Block"], c: 1 },
                { q: "၄။ Uptrend မှာ ခေတ္တပြန်ဆင်းလာတဲ့ အနိမ့်ပိုင်း?", a: ["Lower Low", "Higher Low", "Gap"], c: 1 },
                { q: "၅။ Higher High ဆက်တိုက်ဖြစ်နေတာ ဘာ Market လဲ?", a: ["Bearish", "Bullish", "Sideways"], c: 1 }
            ]},
            2: { vid: "DDLsFro2bpc", quiz: [
                { q: "၁။ Order Block ဆိုတာ ဘာလဲ?", a: ["Same Color Candle", "Last Opposite Candle", "Gap"], c: 1 },
                { q: "၂။ Bullish OB ကို ဘယ်မှာ ရှာရမလဲ?", a: ["Last Red Candle before Up", "Last Green Candle"], c: 0 },
                { q: "၃။ Bearish OB ဆိုတာ ဘယ်လို Zone လဲ?", a: ["Demand", "Supply", "Neutral"], c: 1 },
                { q: "၄။ OB တစ်ခုက ဘယ်အချိန်မှာ ပိုအားကောင်းသလဲ?", a: ["BOS ဖြစ်စေလျှင်", "Size သေးလျှင်"], c: 0 },
                { q: "၅။ Supply Zone မှာ ဘာ Setup ရှာမလဲ?", a: ["Buy", "Sell", "Hold"], c: 1 }
            ]},
            // Lesson 3-7 (Same pattern as above...)
        };

        let curL = 1; let curQ = 0; let isLock = false;

        // Init App UI
        function initUI() {
            const nav = document.getElementById('nav-tabs');
            nav.innerHTML = "";
            for(let i=1; i<=7; i++) {
                const b = document.createElement('button');
                b.className = `nav-btn ${i==1?'active':''}`;
                b.id = `btn-l${i}`;
                b.innerText = `L-${i}`;
                b.onclick = () => switchLesson(i);
                nav.appendChild(b);
            }

            const grid = document.getElementById('card-grid');
            grid.innerHTML = "";
            studyCards.forEach((c, idx) => {
                grid.innerHTML += `<div class="card-box"><div class="card-label">${c.t}</div><div class="card-thumb" onclick="viewCard(${idx})"><img src="${c.i[0]}"></div></div>`;
            });
            switchLesson(1);
        }

        window.switchLesson = (n) => {
            curL = n;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-l${n}`).classList.add('active');
            document.getElementById('main-video').src = `https://www.youtube.com/embed/${lessonData[n]?.vid || "jyad4g6F8FU"}`;
            document.getElementById('quiz-btn-txt').innerText = `L-${n} QUIZ`;
        };

        window.startQuiz = () => { curQ = 0; renderQ(); document.getElementById('quiz-ov').classList.add('active'); };

        function renderQ() {
            isLock = false;
            const data = lessonData[curL]?.quiz[curQ];
            if(!data) { closeQuiz(); return; }
            document.getElementById('quiz-title').innerText = `L-${curL} | QUIZ ${curQ+1}/5`;
            document.getElementById('q-text').innerText = data.q;
            document.getElementById('next-btn').classList.add('hidden');
            const cont = document.getElementById('opt-container');
            cont.innerHTML = "";
            data.a.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'opt-item'; div.innerText = opt;
                div.onclick = () => checkAnswer(idx, data.c, div);
                cont.appendChild(div);
            });
        }

        async function checkAnswer(idx, correct, el) {
            if(isLock) return; isLock = true;
            if(idx === correct) { el.classList.add('correct'); await updateDoc(doc(db, "users", userId), { score: increment(1) }).catch(() => {}); }
            else { el.classList.add('wrong'); document.querySelectorAll('.opt-item')[correct].classList.add('correct'); }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        window.handleNext = () => { curQ++; if(curQ < 5) renderQ(); else closeQuiz(); };
        window.closeQuiz = () => document.getElementById('quiz-ov').classList.remove('active');
        window.openLeaderboard = () => {
            document.getElementById('lb-ov').classList.add('active');
            onSnapshot(query(collection(db, "users"), orderBy("score", "desc"), limit(10)), (s) => {
                const l = document.getElementById('lb-list'); l.innerHTML = "";
                s.forEach(d => { l.innerHTML += `<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #333;"><span>${d.data().name || "Trader"}</span><span style="color:var(--gold)">${d.data().score || 0} pts</span></div>`; });
            });
        };
        window.closeLeaderboard = () => document.getElementById('lb-ov').classList.remove('active');
        window.viewCard = (idx) => {
            const c = studyCards[idx];
            document.getElementById('viewer-title').innerText = c.t;
            const v = document.getElementById('viewer-content'); v.innerHTML = "";
            c.i.forEach(img => { v.innerHTML += `<img src="${img}" style="width:100%;margin-bottom:10px;border-radius:8px;border:1px solid var(--border);">`; });
            document.getElementById('viewer-ov').classList.add('active');
        };
        window.closeViewer = () => document.getElementById('viewer-ov').classList.remove('active');

        // Check Access
        async function checkAccess() {
            const ref = doc(db, "users", userId);
            const snap = await getDoc(ref);
            if(!snap.exists()) { await setDoc(ref, { name: userName, score: 0, is_approved: false }); }
            
            onSnapshot(ref, (s) => {
                if(s.data()?.is_approved) {
                    document.getElementById('app-content').classList.remove('hidden');
                    initUI();
                } else {
                    document.body.innerHTML = `<div style="height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;"><div><h2 style="color:var(--gold);">ACCESS DENIED</h2><p>Please contact Admin to approve your ID: ${userId}</p></div></div>`;
                }
            });
        }
        checkAccess();
    </script>
</body>
</html>
