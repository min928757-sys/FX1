<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Karam - Academy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0d1117; --card: #1c2128; --border: #30363d; }
        body { background-color: var(--bg); color: #adbac7; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; user-select: none; }
        
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        header h1 { color: var(--gold); margin: 0; font-size: 18px; text-transform: uppercase; }

        .wrapper { padding: 20px; display: flex; flex-direction: column; gap: 40px; align-items: center; }

        /* Section Styling */
        .section-container { width: 100%; max-width: 400px; position: relative; }
        .section-title { color: white; font-size: 20px; font-weight: bold; margin-bottom: 10px; border-left: 4px solid var(--gold); padding-left: 10px; }

        /* Stacked Cards Logic */
        .stack { position: relative; width: 100%; height: 250px; cursor: pointer; perspective: 1000px; }
        
        .card { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: var(--card); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform-origin: bottom center;
        }

        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* မညီမညာ ထပ်ထားတဲ့ပုံစံ (Initial Stacked State) */
        .card:nth-child(1) { z-index: 5; transform: translateY(0) rotate(0deg); }
        .card:nth-child(2) { z-index: 4; transform: translateY(-10px) rotate(-2deg); opacity: 0.8; }
        .card:nth-child(3) { z-index: 3; transform: translateY(-20px) rotate(3deg); opacity: 0.6; }
        .card:nth-child(4) { z-index: 2; transform: translateY(-30px) rotate(-4deg); opacity: 0.4; }

        /* Touch လုပ်လိုက်တဲ့အခါ ဖျာထွက်လာတဲ့ပုံစံ (Active State) */
        .stack.active { height: auto; margin-bottom: 50px; }
        
        .stack.active .card { 
            position: relative; 
            margin-bottom: 15px; 
            transform: translateY(0) rotate(0deg) scale(1) !important; 
            opacity: 1 !important;
            height: auto;
        }

        /* Cover Badge */
        .cover-label {
            position: absolute; bottom: 15px; right: 15px;
            background: var(--gold); color: black;
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: bold; z-index: 10;
        }

        footer { text-align: center; padding: 40px; color: #444c56; font-size: 11px; }
    </style>
</head>
<body>

    <header>
        <h1>Fx Karam Academy</h1>
    </header>

    <div class="wrapper">
        <div class="section-container">
            <div class="section-title">Entry Setups</div>
            <div class="stack" id="entry-stack" onclick="this.classList.toggle('active')">
                <div class="cover-label">Tap to Expand</div>
                <div class="card"><img src="1.jpg"></div>
                <div class="card"><img src="2.jpg"></div>
                <div class="card"><img src="3.jpg"></div>
                <div class="card"><img src="4.jpg"></div>
                <div class="card"><img src="5.jpg"></div>
                <div class="card"><img src="6.jpg"></div>
            </div>
        </div>

        <div class="section-container">
            <div class="section-title" style="margin-top: 40px;">Judas Swing</div>
            <div class="stack" id="judas-stack" onclick="this.classList.toggle('active')">
                <div class="cover-label">Tap to Expand</div>
                <div class="card"><img src="7.jpg"></div>
                <div class="card"><img src="8.jpg"></div>
                <div class="card"><img src="9.jpg"></div>
                <div class="card"><img src="10.jpg"></div>
            </div>
        </div>
    </div>

    <footer>
        © 2026 FX KARAM TRADING ACADEMY<br>
        TOUCH THE COVERS TO STUDY
    </footer>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
