    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --border: rgba(240, 185, 11, 0.2); }

        header { background: rgba(28, 33, 40, 0.85); backdrop-filter: blur(10px); padding: 12px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }

        .hidden { display: none !important; }

        /* Video & Lesson Navigation */
        .video-module { padding: 12px; background: rgba(28,33,40,0.5); border-bottom: 1px solid var(--border); }
        .nav-container { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 5px; }

        .nav-btn.active { background: var(--gold); color: black; border-color: var(--gold); }
        
        .video-wrapper { width: 95%; max-width: 500px; margin: 0 auto 10px auto; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--gold); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .action-btns { display: flex; flex-direction: column; gap: 8px; max-width: 500px; margin: 0 auto; }
        .quiz-btn { background: linear-gradient(45deg, #f0b90b, #d4a017); color: black; padding: 12px; border-radius: 6px; font-weight: 800; font-size: 11px; border: none; cursor: pointer; text-transform: uppercase; }
        .lb-toggle-btn { background: #2d333b; color: var(--gold); padding: 10px; border-radius: 6px; font-weight: 700; font-size: 10px; border: 1px solid var(--gold); cursor: pointer; }

        /* Leaderboard Table */
        .leaderboard-container { margin: 15px auto; max-width: 500px; background: #161b22; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; display: none; }
        .leaderboard-container.active { display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #21262d; color: var(--gold); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Chapter Cards */
        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px 15px; }
        .stack { position: relative; width: 100%; aspect-ratio: 3/4; cursor: pointer; }
        .card-front { position: absolute; width: 92%; height: 92%; left: 0; bottom: 0; border-radius: 5px; overflow: hidden; border: 1.5px solid var(--gold); z-index: 2; }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        /* Quiz Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .overlay.active { display: flex; }
        .overlay-header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); background: #1c2128; }
        .quiz-body { padding: 25px; text-align: center; }
        .opt-btn { background: #2d333b; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer; text-align: left; font-size: 14px; }
        .opt-btn.correct { background: #059669 !important; border-color: #34d399; }
        .opt-btn.wrong { background: #dc2626 !important; border-color: #f87171; }
        .next-btn { margin-top: 20px; background: var(--gold); color: black; border: none; padding: 14px; border-radius: 8px; font-weight: 700; width: 100%; display: none; }

            5: [ { q: "၁။ Top-Down Analysis ဆိုတာ ဘာလဲ?", a: ["Lower မှ Higher သို့သွားခြင်း", "Higher Timeframe မှ Lower သို့ ဆင်းခြင်း", "Chart အကုန်ဖွင့်ထားခြင်း"], correct: 1 }, { q: "၂။ Higher Timeframe (Daily) ကို ဘာအတွက် အဓိကသုံးသလဲ?", a: ["Entry Point ရှာရန်", "Market Direction (Trend) ကို သိရန်", "အရောင်းရပ်ရန်"], correct: 1 }, { q: "၃။ Lower Timeframe ကို ဘာအတွက် အဓိကသုံးသလဲ?", a: ["Direction သိရန်", "တကျိသော Entry point (Execution) အတွက်", "Trend ရှာရန်"], correct: 1 }, { q: "၄။ နိုင်ခြေအမြင့်ဆုံး Setup ဖြစ်ဖို့ ဘာလုပ်ရမလဲ?", a: ["Lower TF setup က Higher TF trend နှင့် ကိုက်ညီရမည်", "ချက်ချင်း Buy မည်", "Timeframe တစ်ခုတည်းကြည့်မည်"], correct: 0 }, { q: "၅။ Market Structure ပိုခိုင်မာသော Timeframe မှာ ဘယ်ဟာလဲ?", a: ["1-minute", "15-minute", "Daily"], correct: 2 } ],
            6: [ { q: "၁။ Trading မှာ အရေးကြီးဆုံးအချက်က ဘာလဲ?", a: ["BOS ရှာခြင်း", "Risk Management (အရင်းအနှီး စီမံခန့်ခွဲမှု)", "Indicator သုံးခြင်း"], correct: 1 }, { q: "၂။ '1% Rule' အရ အော်ဒါတစ်ခုမှာ အများဆုံး ဘယ်လောက်ရှုံးခံသင့်သလဲ?", a: ["အကောင့်တစ်ခုလုံး၏ ၅ ရာခိုင်နှုန်း", "အကောင့်တစ်ခုလုံး၏ ၁ ရာခိုင်နှုန်း", "၁၀ ရာခိုင်နှုန်း"], correct: 1 }, { q: "၃။ Risk to Reward 1:3 ဆိုတာ ဘာကို ဆိုလိုတာလဲ?", a: ["၁ ဆ ရှုံးဖို့ ပြင်ဆင်ပြီး ၃ ဆ မြတ်ဖို့ မျှော်လင့်ခြင်း", "၃ ဆ ရှုံးပြီး ၁ ဆ မြတ်ခြင်း", "အရင်းအတိုင်း ပြန်ရခြင်း"], correct: 0 }, { q: "၄။ အရှုံးတွေ ဆက်တိုက်ဖြစ်နေရင်တောင် အကောင့်မပြတ်အောင် ဘာက ကူညီမလဲ?", a: ["Lot size အကြီးကြီးရိုက်ခြင်း", "Proper Position Sizing (မှန်ကန်သော Lot size သုံးစွဲခြင်း)", "ချက်ချင်း အရောင်းရပ်ခြင်း"], correct: 1 }, { q: "၅။ Trader တစ်ယောက်၏ ပထမဆုံးတာဝန်မှာ ဘာလဲ?", a: ["အမြန်ဆုံး သူဌေးဖြစ်ရန်", "အရင်းအနှီးကို မကုန်အောင် ထိန်းသိမ်းခြင်း (Capital Preservation)", "အော်ဒါအများကြီးဖွင့်ရန်"], correct: 1 } ],
            7: [ { q: "၁။ Trading မှာ အောင်မြင်ဖို့အတွက် အရေးကြီးဆုံးက ဘာလဲ?", a: ["Indicator သစ်များ ရှာခြင်း", "Trading Psychology (စိတ်ပညာနှင့် စည်းကမ်း)", "သတင်းများ နားထောင်ခြင်း"], correct: 1 }, { q: "၂။ ရှုံးသွားတဲ့ငွေကို ချက်ချင်းပြန်ရအောင် ဇွတ်အတင်း Trading လုပ်ခြင်းကို ဘယ်လိုခေါ်သလဲ?", a: ["Swing Trading", "Revenge Trading", "Scalping"], correct: 1 }, { q: "၃။ FOMO ဆိုတာ ဘာကို ဆိုလိုတာလဲ?", a: ["အမြတ်များများယူခြင်း", "အခွင့်အရေး လက်လွတ်သွားမှာ ကြောက်ပြီး ဇွတ်ဝင်ခြင်း", "အရှုံးကို လက်ခံခြင်း"], correct: 1 }, { q: "၄။ Professional Trader တစ်ယောက်ဟာ အရှုံး (Loss) ကို ဘယ်လို မြင်သလဲ?", a: ["ကျရှုံးမှုကြီး တစ်ခုအဖြစ်", "လုပ်ငန်းကုန်ကျစရိတ် (Business Expense) တစ်ခုအဖြစ်", "အမြဲတမ်း ရှောင်လွှဲရမည့်အရာအဖြစ်"], correct: 1 }, { q: "၅။ Trading မှာ နိုင်ခြေ (Win Rate) ထက် ဘာက ပိုအရေးကြီးသလဲ?", a: ["Lot size ကြီးခြင်း", "စည်းကမ်းရှိရှိနဲ့ Plan အတိုင်း လုပ်ဆောင်ခြင်း (Discipline)", "ကံကောင်းခြင်း"], correct: 1 } ]
        };

        window.showLesson = (num) => {
            currentLesson = parseInt(num);
            document.getElementById('video-frame').src = "https://www.youtube.com/embed/" + videos[num];
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-l' + num).classList.add('active');
            // Change Dynamic Button Text
            document.getElementById('dynamic-quiz-btn').innerText = `✍️ LESSON ${num} QUIZ`;
        };

        window.openQuiz = () => {
            currentQIndex = 0;
            loadQuestion();
            document.getElementById('quiz-overlay').classList.add('active');
        };

        function loadQuestion() {
            answered = false;
            const data = allQuizzes[currentLesson][currentQIndex];
            document.getElementById('quiz-header-title').innerText = `LESSON ${currentLesson} QUIZ (${currentQIndex+1}/5)`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('feedback-text').innerText = "";
            document.getElementById('next-btn').style.display = "none";
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            data.a.forEach((opt, idx) => {
                const b = document.createElement('div');
                b.className = 'opt-btn';
                b.innerText = opt;
                b.onclick = () => checkAnswer(idx, data.correct, b);
                container.appendChild(b);
            });
        }

        async function checkAnswer(idx, correct, btn) {
            if (answered) return;
            answered = true;
            const qKey = `L${currentLesson}_Q${currentQIndex}`;
            const userRef = doc(db, "users", myUserId);
            const userDoc = await getDoc(userRef);
            const solvedList = userDoc.data()?.solved_questions || [];
            const previouslyCorrect = solvedList.includes(qKey);

            if (idx === correct) {
                btn.classList.add('correct');
                document.getElementById('feedback-text').innerHTML = "✅ အဖြေမှန်ပါတယ်!";
                if (!previouslyCorrect) {
                    await updateDoc(userRef, { score: increment(1), solved_questions: arrayUnion(qKey), name: myName });
                }
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                btn.classList.add('wrong');
                document.querySelectorAll('.opt-btn')[correct].classList.add('correct');
                document.getElementById('feedback-text').innerHTML = "❌ မှားသွားပါတယ်!";
                if (previouslyCorrect) {
                    await updateDoc(userRef, { score: increment(-1), solved_questions: arrayRemove(qKey) });
                }
                tg.HapticFeedback.notificationOccurred('error');
            }
            document.getElementById('next-btn').style.display = "block";
        }

        window.nextQuestion = () => {
            currentQIndex++;
            if (currentQIndex < 5) loadQuestion();
            else { tg.showAlert("Lesson Quiz ပြီးဆုံးပါပြီ!"); closeQuiz(); }
        };

        window.closeQuiz = () => document.getElementById('quiz-overlay').classList.remove('active');

        window.toggleLeaderboard = () => {
            const lb = document.getElementById('leaderboard-ui');
            lb.classList.toggle('active');
            if(lb.classList.contains('active')) fetchLB();
        };

        function fetchLB() {
            const q = query(collection(db, "users"), orderBy("score", "desc"), limit(10));
            onSnapshot(q, (snap) => {
                const body = document.getElementById('lb-table-body');
                body.innerHTML = "";
                let i = 1;
                snap.forEach(d => {
                    const data = d.data();
                    const maskedId = d.id.length > 3 ? d.id.slice(0, -3) + "***" : d.id;
                    body.innerHTML += `<tr><td>${i}</td><td>${data.name} (${maskedId})</td><td style="text-align:right; color:var(--gold); font-weight:bold">${data.score || 0}</td></tr>`;
                    i++;
                });
            });
        }

        // Initialize grid and auth
        onSnapshot(doc(db, "users", myUserId), (s) => {
            if(s.exists() && s.data().is_approved) {
                document.getElementById('unlocked-section').classList.remove('hidden');
                showLesson(1);
            }
        });
    </script>
</body>
</html>
