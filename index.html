        .lb-toggle-btn { background: #2d333b; color: var(--gold); border: 1px solid var(--gold); }

        .opt-list { display: flex; flex-direction: column; gap: 12px; }

                { q: "၁။ Trading မှာ အောင်မြင်ဖို့အတွက် အရေးကြီးဆုံးက ဘာလဲ?", a: ["Indicator သစ်များ ရှာခြင်း", "Trading Psychology (စိတ်ပညာနှင့် စည်းကမ်း)", "သတင်းများ နားထောင်ခြင်း"], correct: 1 }, 
                { q: "၂။ ရှုံးသွားတဲ့ငွေကို ချက်ချင်းပြန်ရအောင် ဇွတ်အတင်း Trading လုပ်ခြင်းကို ဘယ်လိုခေါ်သလဲ?", a: ["Swing Trading", "Revenge Trading", "Scalping"], correct: 1 }, 
                { q: "၃။ FOMO ဆိုတာ ဘာကို ဆိုလိုတာလဲ?", a: ["အမြတ်များများယူခြင်း", "အခွင့်အရေး လက်လွတ်သွားမှာ ကြောက်ပြီး ဇွတ်ဝင်ခြင်း", "အရှုံးကို လက်ခံခြင်း"], correct: 1 }, 
                { q: "၄။ Professional Trader တစ်ယောက်ဟာ အရှုံး (Loss) ကို ဘယ်လို မြင်သလဲ?", a: ["ကျရှုံးမှုကြီး တစ်ခုအဖြစ်", "လုပ်ငန်းကုန်ကျစရိတ် (Business Expense) တစ်ခုအဖြစ်", "အမြဲတမ်း ရှောင်လွှဲရမည့်အရာအဖြစ်"], correct: 1 }, 
                { q: "၅။ Trading မှာ နိုင်ခြေ (Win Rate) ထက် ဘာက ပိုအရေးကြီးသလဲ?", a: ["Lot size ကြီးခြင်း", "စည်းကမ်းရှိရှိနဲ့ Plan အတိုင်း လုပ်ဆောင်ခြင်း (Discipline)", "ကံကောင်းခြင်း"], correct: 1 } 
            ]
        };

        // --- CORE QUIZ ENGINE ---
        window.showLesson = (num) => {
            currentLesson = parseInt(num); // Ensure number
            document.getElementById('video-frame').src = "https://www.youtube.com/embed/" + videos[num];
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-l' + num).classList.add('active');
        };

        window.openQuiz = () => {
            currentQIndex = 0; 
            loadQuestion();
            document.getElementById('quiz-overlay').classList.add('active');
        };

        function loadQuestion() {
            answered = false;
            const quizData = allQuizzes[currentLesson]; 
            const data = quizData[currentQIndex];

            document.getElementById('quiz-title-display').innerText = `LESSON ${currentLesson} - QUIZ ${currentQIndex + 1}/5`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('feedback-text').innerText = "";
            document.getElementById('next-btn').style.display = "none";
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            data.a.forEach((opt, idx) => {
                const b = document.createElement('div');
                b.className = 'opt-btn';
                b.innerText = opt;
                b.onclick = () => checkAnswer(idx, data.correct, b);
                container.appendChild(b);
            });
        }

        async function checkAnswer(userChoice, correctIdx, btn) {
            if (answered) return;
            answered = true;
            const options = document.querySelectorAll('.opt-btn');
            
            if (userChoice === correctIdx) {
                btn.classList.add('correct');
                document.getElementById('feedback-text').innerHTML = "<span style='color:#34d399;'>✅ မှန်ကန်ပါတယ် ဆရာကြီး!</span>";
                tg.HapticFeedback.notificationOccurred('success');
                await updateDoc(doc(db, "users", myUserId), { score: increment(10), name: myName });
            } else {
                btn.classList.add('wrong');
                options[correctIdx].classList.add('correct');
                document.getElementById('feedback-text').innerHTML = `<span style='color:#f87171;'>❌ မှားပါတယ်။ အဖြေမှန်က "${options[correctIdx].innerText}" ပါ။</span>`;
                tg.HapticFeedback.notificationOccurred('error');
            }
            document.getElementById('next-btn').style.display = "block";
        }

        window.nextQuestion = () => {
            currentQIndex++;
            if (currentQIndex < 5) {
                loadQuestion();
            } else {
                tg.showAlert(`ဂုဏ်ယူပါတယ် ဆရာကြီး! Lesson ${currentLesson} ရဲ့ Quiz အားလုံး ဖြေဆိုပြီးပါပြီ။`);
                closeQuiz();
            }
        };

        window.closeQuiz = () => document.getElementById('quiz-overlay').classList.remove('active');

        // --- LEADERBOARD ENGINE ---
        window.toggleLeaderboard = () => {
            const ui = document.getElementById('leaderboard-ui');
            ui.classList.toggle('active');
            if(ui.classList.contains('active')) fetchLeaderboard();
        };

        function fetchLeaderboard() {
            const q = query(collection(db, "users"), orderBy("score", "desc"), limit(10));
            onSnapshot(q, (snap) => {
                const body = document.getElementById('lb-table-body');
                body.innerHTML = "";
                let rank = 1;
                snap.forEach(d => {
                    const data = d.data();
                    const id = d.id;
                    const maskedId = id.length > 3 ? id.slice(0, -3) + "***" : id;
                    body.innerHTML += `<tr>
                        <td class="rank-col">${rank}</td>
                        <td>${data.name || 'Trader'} <span style="color:#555; font-size:9px;">(${maskedId})</span></td>
                        <td style="text-align:right; font-weight:bold; color:var(--gold)">${data.score || 0}</td>
                    </tr>`;
                    rank++;
                });
            });
        }

        // --- IMAGE CARDS GRID ---
        const cardLessons = [
            { title: 'Entry Setups', images: ['Entry Setups - 1.png', 'Entry Setups - 2.png'] },
            { title: 'Cypher', images: ['Cypher Pattern - 1.png', 'Cypher Pattern - 2.png'] },
            { title: 'Gartley', images: ['Gartley Pattern - 1.png', 'Gartley Pattern - 2.png'] },
            { title: 'Inducement', images: ['Inducement - 10Apr26 - 1.png', 'Inducement - 10Apr26 - 2.png'] },
            { title: 'OCL', images: ['OCL - 1.png', 'OCL - 2.png'] },
            { title: 'SMT', images: ['SMT - 1.png', 'SMT - 2.png'] },
            { title: 'Market Mech', images: ['Market Mechanics - 1.png', 'Market Mechanics - 2.png'] },
            { title: 'Quasimodo', images: ['Quasimodo - 1.png', 'Quasimodo - 2.png'] },
            { title: 'OTE Setup', images: ['OTE Setup - 1.png', 'OTE Setup - 2.png'] },
            { title: 'Equal High', images: ['Equal High - 1.png', 'Equal High - 2.png'] },
            { title: 'Risk MGMT', images: ['Risk Management - 1.png', 'Risk Management - 2.png'] },
            { title: 'M-Average', images: ['Moving Average - 1.png', 'Moving Average - 2.png'] }
        ];

        const grid = document.getElementById('main-grid');
        cardLessons.forEach((lesson, index) => {
            const box = document.createElement('div');
            box.className = 'section-box';
            box.innerHTML = `
                <div class="section-label">${lesson.title}</div>
                <div class="stack" onclick="openChapter(${index})">
                    <div class="card-back"></div>
                    <div class="card-front"><img src="${lesson.images[0]}"></div>
                </div>`;
            grid.appendChild(box);
        });

        window.openChapter = (idx) => {
            const data = cardLessons[idx];
            document.getElementById('module-title').innerText = data.title;
            const content = document.getElementById('viewer-content');
            content.innerHTML = "";
            data.images.forEach(img => {
                content.innerHTML += `<img src="${img}" style="width:100%; border-radius:8px; margin-bottom:12px; border:1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.3);">`;
            });
            document.getElementById('viewer').classList.add('active');
        };
        window.closeChapter = () => document.getElementById('viewer').classList.remove('active');

        // --- AUTH & INITIAL LOAD ---
        onSnapshot(doc(db, "users", myUserId), (docSnap) => {
            if (docSnap.exists() && docSnap.data().is_approved === true) {
                document.getElementById('unlocked-section').classList.remove('hidden');
                showLesson(1); // Default to Lesson 1
            }
        });
    </script>
</body>
</html>
