<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX KARAM EDUCATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card-bg: #1c2128; --border: rgba(240, 185, 11, 0.25); --text-gray: #9ca3af; }
        body { background-color: var(--bg); color: #e5e7eb; font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; }
        
        header { 
            background: #1c2128; padding: 16px; text-align: center; 
            border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000;
        }
        header h1 { color: var(--gold); margin: 0; font-size: 15px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'Poppins'; }

        /* အတန်းလိုက် ဆင်းသွားစေရန် Grid ကို ပြင်ဆင်ခြင်း */
        .chapter-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* ၃ ခု တစ်တန်း */
            gap: 20px 12px; /* အပေါ်အောက် ၂၀px ခွာမည် */
            padding: 25px 15px;
        }

        .section-box { display: flex; flex-direction: column; align-items: center; }
        
        .section-label { 
            font-size: 8px; font-weight: 700; color: var(--gold); 
            margin-bottom: 10px; text-align: center; letter-spacing: 0.5px;
            text-transform: uppercase; height: 24px; display: flex; align-items: center;
        }

        .stack { position: relative; width: 100%; aspect-ratio: 3/4; cursor: pointer; }
        
        .card { 
            position: absolute; width: 100%; height: 100%; 
            background: var(--card-bg); border-radius: 8px; 
            border: 1px solid var(--border); overflow: hidden; 
            transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* Stack Look */
        .card:nth-child(1) { z-index: 3; transform: translate(0, 0); }
        .card:nth-child(2) { z-index: 2; transform: translate(4px, -4px); opacity: 0.7; }
        .card:nth-child(3) { z-index: 1; transform: translate(8px, -8px); opacity: 0.4; }

        /* Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 14, 17, 0.98); z-index: 2000; display: none; flex-direction: column; }
        .overlay.active { display: flex; }
        .overlay-header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
        .close-btn { color: var(--gold); font-weight: 600; font-size: 12px; cursor: pointer; }
        .viewer-scroll { padding: 15px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .expanded-img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }

        footer { text-align: center; padding: 50px 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer-brand { color: var(--gold); font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-family: 'Poppins'; }
    </style>
</head>
<body>

    <header><h1>FX KARAM EDUCATION</h1></header>

    <div class="chapter-grid" id="main-grid">
        </div>

    <div id="viewer" class="overlay">
        <div class="overlay-header">
            <span id="module-title" style="color:white; font-size:12px; font-weight:600;">LEARNING MODULE</span>
            <div class="close-btn" onclick="closeChapter()">CLOSE [X]</div>
        </div>
        <div class="viewer-scroll" id="viewer-content"></div>
    </div>

    <footer>
        <div class="footer-brand">FX KARAM EDUCATION</div>
    </footer>

    <script>
        // GitHub ပုံနာမည်များအတိုင်း စုစည်းထားသော Data
        const lessons = [
            { title: 'Entry Setups', prefix: 'Entry Setups', count: 6 },
            { title: 'Cypher', prefix: 'Cypher Pattern', count: 5 },
            { title: 'Liquidity', prefix: 'Buyside Liquidity', count: 4 },
            { title: 'Gartley', prefix: 'Gartley Pattern', count: 5 },
            { title: 'London High', prefix: 'London High', count: 4 },
            { title: 'OCL', prefix: 'OCL', count: 4 },
            { title: 'PDH', prefix: 'PDH', count: 4 },
            { title: 'SMT', prefix: 'SMT', count: 4 },
            { title: 'Weekly', prefix: 'W', count: 4 }
        ];

        const grid = document.getElementById('main-grid');

        // ပုံတွေကို Grid ထဲ အလိုအလျောက် စီပေးမည့် function
        lessons.forEach(lesson => {
            const box = document.createElement('div');
            box.className = 'section-box';
            box.innerHTML = `
                <div class="section-label">${lesson.title}</div>
                <div class="stack" onclick="openChapter('${lesson.prefix}', ${lesson.count})">
                    <div class="card"><img src="${lesson.prefix} - 1.png"></div>
                    <div class="card"><img src="${lesson.prefix} - 2.png"></div>
                    <div class="card"><img src="${lesson.prefix} - 3.png"></div>
                </div>
            `;
            grid.appendChild(box);
        });

        function openChapter(prefix, count) {
            const content = document.getElementById('viewer-content');
            document.getElementById('module-title').innerText = prefix.toUpperCase();
            content.innerHTML = '';
            
            for (let i = 1; i <= count; i++) {
                const img = document.createElement('img');
                img.src = `${prefix} - ${i}.png`;
                img.className = 'expanded-img';
                content.appendChild(img);
            }
            document.getElementById('viewer').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeChapter() {
            document.getElementById('viewer').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
