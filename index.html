<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Psychology Deep Quiz</title>

<style>

body{
font-family: "Noto Sans Myanmar", sans-serif;
background: linear-gradient(135deg,#1f1c2c,#928dab);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
flex-direction:column;
}

.container{
text-align:center;
}

.flashcard{
width:340px;
height:260px;
background:rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
border-radius:20px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
cursor:pointer;
transition: transform 0.6s;
}

.answers{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.answers button{
flex:1;
margin:4px;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:15px;
font-weight:bold;
font-size:18px;
}

.next{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#00ffb3;
color:black;
font-weight:bold;
cursor:pointer;
}

footer{
position:fixed;
bottom:10px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<div class="flashcard" id="card">
<div id="question">Flash Card ကို Tap လုပ်ပြီး Quiz စပါ</div>

<div class="answers" id="answers" style="display:none">
<button onclick="selectAnswer(0)">A</button>
<button onclick="selectAnswer(1)">B</button>
<button onclick="selectAnswer(2)">C</button>
<button onclick="selectAnswer(3)">D</button>
</div>

<div class="result" id="result"></div>

<button class="next" id="nextBtn" onclick="nextQuestion()" style="display:none">Next</button>

</div>

</div>

<footer>
📢 Telegram - @fxkaram
</footer>

<audio id="tapSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>

const quiz=[

{
q:"Loss တစ်ခုပြီးတိုင်း revenge trade လုပ်ချင်လာတာဟာ ဘာကိုပြသသလဲ?",
a:["စိတ်ရှည်မှု","စိတ်အလိုလိုက်ခြင်း","Discipline","Risk management"],
c:1
},

{
q:"Trader တစ်ယောက်အတွက် အကြီးဆုံး enemy ကဘာလဲ?",
a:["Market maker","Fear & Greed","News","Spread"],
c:1
},

{
q:"Plan မရှိဘဲ trade ဝင်ခြင်းကို psychology အရဘာခေါ်လဲ?",
a:["Random impulse","Calculated risk","Smart entry","Institutional trading"],
c:0
},

{
q:"Winning streak ၅ခုဆက်တိုက်ပြီး lot size တိုးချင်လာခြင်းဟာဘာလဲ?",
a:["Confidence","Overconfidence","Discipline","Logic"],
c:1
},

{
q:"Stop loss မတင်ပဲ trade ဝင်တာဟာဘာကိုပြသသလဲ?",
a:["Fear","Risk control","Hope trading","Patience"],
c:2
},

{
q:"Trader တစ်ယောက် profitable ဖြစ်ဖို့အရေးကြီးဆုံး habit ကဘာလဲ?",
a:["Indicators","Consistency","Big lot","Signal group"],
c:1
},

{
q:"Loss ကို accept မလုပ်နိုင်ခြင်းကဘာကိုဖြစ်စေသလဲ?",
a:["Account growth","Revenge trading","Calm mindset","Precision"],
c:1
},

{
q:"Trade မရှိတဲ့နေ့မှာ patience ထိန်းနိုင်ခြင်းဟာဘာလဲ?",
a:["Weakness","Professional mindset","Fear","Random thinking"],
c:1
},

{
q:"Market ကို prove လုပ်ချင်တဲ့စိတ်ကဘာဖြစ်စေသလဲ?",
a:["Objectivity","Ego trading","Discipline","Focus"],
c:1
},

{
q:"Trading psychology master ဖြစ်ဖို့ အရေးကြီးဆုံးအရာကဘာလဲ?",
a:["Indicators","Mind control","Broker","News"],
c:1
}

]

let index=0
let score=0
let started=false

const card=document.getElementById("card")
const question=document.getElementById("question")
const answers=document.getElementById("answers")
const result=document.getElementById("result")
const nextBtn=document.getElementById("nextBtn")

card.onclick=function(){

if(!started){
started=true
loadQuestion()
}

}

function loadQuestion(){

question.innerText=quiz[index].q

answers.style.display="flex"

const btns=answers.children

btns[0].innerText="A. "+quiz[index].a[0]
btns[1].innerText="B. "+quiz[index].a[1]
btns[2].innerText="C. "+quiz[index].a[2]
btns[3].innerText="D. "+quiz[index].a[3]

result.innerText=""
nextBtn.style.display="none"

}

function selectAnswer(i){

document.getElementById("tapSound").play()

if(i===quiz[index].c){

result.innerText="✅ မှန်ပါတယ်"
score++

}else{

result.innerText="❌ မှားပါတယ် — အဖြေမှန်: "+quiz[index].a[quiz[index].c]

}

nextBtn.style.display="inline-block"

}

function nextQuestion(){

index++

if(index<quiz.length){

loadQuestion()

}else{

showScore()

}

}

function showScore(){

question.innerHTML="Quiz ပြီးပါပြီ<br><br>Total Score: "+score+"/10"

answers.style.display="none"
nextBtn.style.display="none"

let advice=""

if(score<=4){

advice="သင့် Trading Psychology ကိုပြန်လေ့လာသင့်ပါတယ်။ Emotion control မရှိသေးပါ။"

}else if(score<=7){

advice="Good Trader mindset ရှိလာနေပါပြီ။ Discipline ကိုပိုတိုးပါ။"

}else{

advice="Excellent mindset 🔥 Professional Trader psychology နီးပါးပါပဲ။"

}

result.innerText=advice

}

</script>

</body>
</html>
