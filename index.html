<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Karam - ICT Course</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { margin: 0; background-color: #0d1117; display: flex; flex-direction: column; align-items: center; }
        #pdf-container { width: 100%; max-width: 800px; }
        canvas { width: 100% !important; height: auto !important; margin-bottom: 10px; border-bottom: 2px solid #30363d; }
        .loading { color: #f0b90b; text-align: center; margin-top: 50px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading Course Content...</div>
    <div id="pdf-container"></div>

    <script>
        const url = 'course.pdf.pdf'; // သင့် PDF ဖိုင်နာမည်
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const container = document.getElementById('pdf-container');
        const loading = document.getElementById('loading');

        pdfjsLib.getDocument(url).promise.then(pdf => {
            loading.style.display = 'none';
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                pdf.getPage(pageNum).then(page => {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 2 }); // ကြည်လင်အောင် scale 2 ထားခြင်း

                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = { canvasContext: context, viewport: viewport };
                    page.render(renderContext);
                    container.appendChild(canvas);
                });
            }
        }).catch(err => {
            loading.innerText = "Error loading PDF. Please check file name.";
            console.error(err);
        });

        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
