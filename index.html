<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Karam - Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1c2128; --border: rgba(240, 185, 11, 0.2); }
        body { background-color: var(--bg); color: #adbac7; font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; }
        
        header { 
            background: rgba(28, 33, 40, 0.95); 
            padding: 12px; 
            text-align: center; 
            border-bottom: 1px solid var(--gold);
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        header h1 { 
            color: var(--gold); margin: 0; font-size: 16px; 
            font-family: 'Orbitron', sans-serif; letter-spacing: 2px;
        }

        .wrapper { padding: 15px; display: flex; flex-direction: column; gap: 25px; align-items: center; }

        .section-container { width: 100%; max-width: 350px; }
        
        /* Special Font for Section Titles */
        .section-title { 
            color: white; font-size: 14px; font-weight: bold; margin-bottom: 12px; 
            font-family: 'Orbitron', sans-serif; display: flex; align-items: center; gap: 8px;
        }
        .section-title::before { content: ''; width: 3px; height: 15px; background: var(--gold); display: inline-block; }

        /* Smaller Compact Stack */
        .stack { position: relative; width: 100%; height: 180px; cursor: pointer; perspective: 1000px; }
        
        .card { 
            position: absolute; width: 100%; height: 100%; 
            background: var(--card); border-radius: 10px; 
            border: 1px solid var(--border); overflow: hidden; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transform-origin: bottom center;
        }

        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* Initial Stacked Look (More compact) */
        .card:nth-child(1) { z-index: 5; transform: translateY(0); }
        .card:nth-child(2) { z-index: 4; transform: translateY(-6px) scale(0.98); opacity: 0.7; }
        .card:nth-child(3) { z-index: 3; transform: translateY(-12px) scale(0.96); opacity: 0.4; }

        /* Active Spreading */
        .stack.active { height: auto; margin-bottom: 20px; }
        .stack.active .card { 
            position: relative; margin-bottom: 10px; 
            transform: translateY(0) scale(1) !important; 
            opacity: 1 !important; height: auto;
        }

        .tap-hint {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(240, 185, 11, 0.9); color: black;
            padding: 4px 10px; border-radius: 15px;
            font-size: 10px; font-weight: bold; z-index: 10;
            font-family: 'Orbitron', sans-serif;
        }

        footer { text-align: center; padding: 30px; color: #444c56; font-size: 10px; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <h1>FX KARAM ACADEMY</h1>
    </header>

    <div class="wrapper">
        <div class="section-container">
            <div class="section-title">ENTRY SETUPS</div>
            <div class="stack" onclick="this.classList.toggle('active')">
                <div class="tap-hint">EXPAND</div>
                <div class="card"><img src="PDF Learning Course - 1.jpeg"></div>
                <div class="card"><img src="PDF Learning Course - 2.jpeg"></div>
                <div class="card"><img src="PDF Learning Course - 3.jpeg"></div>
                <div class="card"><img src="PDF Learning Course - 4.jpeg"></div>
                <div class="card"><img src="PDF Learning Course - 5.jpeg"></div>
                <div class="card"><img src="PDF Learning Course - 6.jpeg"></div>
            </div>
        </div>

        <div class="section-container">
            <div class="section-title">JUDAS SWING</div>
            <div class="stack" onclick="this.classList.toggle('active')">
                <div class="tap-hint">EXPAND</div>
                <div class="card"><img src="PDF Learning Course - 7.jpeg"></div>
                <div class="card"><img src="PDF Learning Course - 8.jpeg"></div>
                <div class="card"><img src="PDF Learning Course - 9.jpeg"></div>
                <div class="card"><img src="PDF Learning Course - 10.jpeg"></div>
            </div>
        </div>
    </div>

    <footer>TERMINAL ACCESS v2.0</footer>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
