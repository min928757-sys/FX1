<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Karam - Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1c2128; --border: rgba(240, 185, 11, 0.3); }
        body { background-color: var(--bg); color: #adbac7; font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; overflow-x: hidden; scroll-behavior: smooth; }
        
        header { 
            background: rgba(28, 33, 40, 0.95); padding: 15px; text-align: center; 
            border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        header h1 { color: var(--gold); margin: 0; font-size: 16px; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        .wrapper { padding: 20px; display: flex; flex-direction: column; gap: 35px; align-items: center; }
        .section-container { width: 100%; max-width: 350px; }
        
        .section-title { 
            color: white; font-size: 13px; font-family: 'Orbitron', sans-serif; 
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
        }
        .section-title::before { content: ''; width: 3px; height: 14px; background: var(--gold); display: inline-block; }

        /* Initial Stack Look */
        .stack { position: relative; width: 100%; height: 180px; cursor: pointer; transition: all 0.5s ease; }
        
        .card { 
            position: absolute; width: 100%; height: 100%; 
            background: var(--card); border-radius: 12px; 
            border: 1px solid var(--border); overflow: hidden; 
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transform-origin: center center;
        }

        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* Initial Spread */
        .card:nth-child(1) { z-index: 5; transform: translateY(0); }
        .card:nth-child(2) { z-index: 4; transform: translateY(-15px) scale(0.95); opacity: 0.8; }
        .card:nth-child(3) { z-index: 3; transform: translateY(-30px) scale(0.90); opacity: 0.5; }

        /* Active Expand State */
        .stack.active { height: auto; margin-bottom: 30px; }
        .stack.active .card { 
            position: relative; margin-bottom: 12px; 
            transform: translateY(0) scale(1) !important; 
            opacity: 1 !important; height: auto;
        }

        /* Staggered Delay for Animation */
        .stack.active .card { transition-delay: calc(var(--i) * 0.08s); }

        .btn-expand {
            position: absolute; bottom: 12px; right: 12px;
            background: var(--gold); color: black;
            padding: 5px 12px; border-radius: 6px;
            font-size: 10px; font-weight: bold; z-index: 10;
            font-family: 'Orbitron', sans-serif;
        }
        .stack.active .btn-expand { display: none; }

        footer { text-align: center; padding: 40px; color: #444c56; font-size: 10px; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <header>
        <h1>FX KARAM ACADEMY</h1>
    </header>

    <div class="wrapper">
        <div class="section-container">
            <div class="section-title">ENTRY SETUPS</div>
            <div class="stack" onclick="this.classList.toggle('active')" id="entry-stack">
                <div class="btn-expand">VIEW ALL</div>
            </div>
        </div>

        <div class="section-container">
            <div class="section-title">JUDAS SWING</div>
            <div class="stack" onclick="this.classList.toggle('active')" id="judas-stack">
                <div class="btn-expand">VIEW ALL</div>
            </div>
        </div>
    </div>

    <footer>TERMINAL ACCESS v2.8</footer>

    <script>
        // ပုံအရေအတွက် သတ်မှတ်ခြင်း
        const entryPages = [1, 2, 3, 4, 5, 6];
        const judasPages = [7, 8, 9, 10];

        const loadCards = (pages, containerId) => {
            const container = document.getElementById(containerId);
            pages.forEach((num, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.setProperty('--i', index); // Animation delay အတွက်
                card.innerHTML = `<img src="${num}.jpg" alt="Lesson ${num}">`;
                container.appendChild(card);
            });
        }

        loadCards(entryPages, 'entry-stack');
        loadCards(judasPages, 'judas-stack');

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
