<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Karam - ICT Academy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0d1117; --card: #1c2128; --border: #30363d; }
        body { background-color: var(--bg); color: #adbac7; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; user-select: none; scroll-behavior: smooth; }
        
        /* Sticky Header */
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        header h1 { color: var(--gold); margin: 0; font-size: 18px; text-transform: uppercase; }

        /* Clean Navigation Table */
        .nav-container { padding: 15px; background: #22272e; margin: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .nav-label { font-size: 12px; color: var(--gold); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .nav-links { display: flex; flex-direction: column; gap: 10px; }
        .section-btn { 
            background: var(--card); 
            border: 1px solid var(--border); 
            color: white; 
            padding: 12px 15px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-size: 14px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-btn:active { background: #2d333b; border-color: var(--gold); }
        .section-btn::after { content: '→'; color: var(--gold); }

        /* Content Sections */
        .section-title { margin: 30px 15px 15px; padding-left: 12px; border-left: 4px solid var(--gold); }
        .section-title h2 { margin: 0; font-size: 22px; color: white; }
        
        .container { padding: 0 15px 20px; display: flex; flex-direction: column; gap: 20px; }
        .flash-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .flash-card img { width: 100%; height: auto; display: block; }
        .card-info { padding: 10px; font-size: 11px; text-align: center; color: #545d68; border-top: 1px solid var(--border); }

        footer { text-align: center; padding: 50px 20px; color: #444c56; font-size: 11px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <h1>Fx Karam Academy</h1>
    </header>

    <div class="nav-container">
        <div class="nav-label">Course Chapters</div>
        <div class="nav-links">
            <a href="#entry-setups" class="section-btn">Entry Setups Section</a>
            <a href="#judas-swing" class="section-btn">Judas Swing Section</a>
        </div>
    </div>

    <div id="entry-setups" class="section-title">
        <h2>Entry Setups</h2>
    </div>
    <div class="container" id="entry-list"></div>

    <div id="judas-swing" class="section-title">
        <h2>Judas Swing</h2>
    </div>
    <div class="container" id="judas-list"></div>

    <footer>
        STUDENT EXCLUSIVE CONTENT<br>
        © 2026 FX KARAM TRADING ACADEMY
    </footer>

    <script>
        // ဒီနေရာမှာ နောက်ပိုင်း ပုံတွေထပ်တိုးချင်ရင် နံပါတ်လေးတွေ ထပ်ထည့်ရုံပါပဲ
        const entryPages = [1, 2, 3, 4, 5, 6]; 
        const judasPages = [7, 8, 9, 10];

        const generateCards = (pages, containerId) => {
            const container = document.getElementById(containerId);
            pages.forEach(num => {
                const card = document.createElement('div');
                card.className = 'flash-card';
                card.innerHTML = `
                    <img src="${num}.jpg" loading="lazy">
                    <div class="card-info">FX KARAM - ICT MODULES</div>
                `;
                container.appendChild(card);
            });
        };

        generateCards(entryPages, 'entry-list');
        generateCards(judasPages, 'judas-list');

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
