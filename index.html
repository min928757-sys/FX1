<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX KARAM EDUCATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card-bg: #1c2128; --border: rgba(240, 185, 11, 0.25); --text-gray: #9ca3af; }
        
        body { 
            background-color: var(--bg); color: #e5e7eb; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; user-select: none; 
            -webkit-font-smoothing: antialiased;
        }
        
        header { 
            background: #1c2128; padding: 16px; text-align: center; 
            border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000;
        }
        header h1 { 
            color: var(--gold); margin: 0; font-size: 15px; 
            font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
        }

        /* 3-Column Grid Layout */
        .chapter-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; padding: 25px 15px;
        }

        .section-box { display: flex; flex-direction: column; align-items: center; }
        
        .section-label { 
            font-size: 8px; font-weight: 700; color: var(--gold); 
            margin-bottom: 12px; text-align: center; letter-spacing: 0.8px;
            text-transform: uppercase; height: 20px; display: flex; align-items: center;
        }

        /* Pro Stacked Deck Look */
        .stack { 
            position: relative; width: 100%; aspect-ratio: 3/4; 
            cursor: pointer; perspective: 1000px;
        }
        
        .card { 
            position: absolute; width: 100%; height: 100%; 
            background: var(--card-bg); border-radius: 8px; 
            border: 1px solid var(--border); overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* Stacking Effect */
        .card:nth-child(1) { z-index: 3; transform: translate(0, 0); }
        .card:nth-child(2) { z-index: 2; transform: translate(4px, -4px); opacity: 0.7; }
        .card:nth-child(3) { z-index: 1; transform: translate(8px, -8px); opacity: 0.4; }

        /* Overlay Viewer */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 17, 0.98); z-index: 2000;
            display: none; flex-direction: column;
        }
        .overlay.active { display: flex; }
        
        .overlay-header {
            padding: 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 10;
        }
        .close-btn { color: var(--gold); font-weight: 600; font-size: 12px; cursor: pointer; font-family: 'Poppins'; }

        .viewer-scroll { padding: 15px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .expanded-img { width: 100%; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 5px 20px rgba(0,0,0,0.6); }

        /* Stylish Footer */
        footer { 
            text-align: center; padding: 50px 20px; 
            margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .footer-brand { 
            color: var(--gold); font-size: 14px; font-weight: 700; 
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
            font-family: 'Poppins', sans-serif;
        }
        .footer-tag { color: var(--text-gray); font-size: 10px; letter-spacing: 1px; font-weight: 500; }
    </style>
</head>
<body>

    <header><h1>FX KARAM EDUCATION</h1></header>

    <div class="chapter-grid">
        <div class="section-box">
            <div class="section-label">ENTRY SETUPS</div>
            <div class="stack" onclick="openChapter('entry')">
                <div class="card"><img src="Entry Setups - 1.png"></div>
                <div class="card"><img src="Entry Setups - 2.png"></div>
                <div class="card"><img src="Entry Setups - 3.png"></div>
            </div>
        </div>

        <div class="section-box">
            <div class="section-label">CYPHER</div>
            <div class="stack" onclick="openChapter('cypher')">
                <div class="card"><img src="Cypher Pattern - 1.png"></div>
                <div class="card"><img src="Cypher Pattern - 2.png"></div>
                <div class="card"><img src="Cypher Pattern - 3.png"></div>
            </div>
        </div>

        <div class="section-box">
            <div class="section-label">LIQUIDITY</div>
            <div class="stack" onclick="openChapter('liquidity')">
                <div class="card"><img src="Buyside Liquidity - 1.png"></div>
                <div class="card"><img src="Buyside Liquidity - 2.png"></div>
                <div class="card"><img src="Buyside Liquidity - 3.png"></div>
            </div>
        </div>
    </div>

    <div id="viewer" class="overlay">
        <div class="overlay-header">
            <span id="module-title" style="color:white; font-size:12px; font-weight:600; text-transform:uppercase;">LEARNING MODULE</span>
            <div class="close-btn" onclick="closeChapter()">CLOSE [X]</div>
        </div>
        <div class="viewer-scroll" id="viewer-content"></div>
    </div>

    <footer>
        <div class="footer-brand">FX KARAM EDUCATION</div>
        <div class="footer-tag">THE PREMIER ICT TRADING ACADEMY</div>
    </footer>

    <script>
        // GitHub ပေါ်ရှိ ပုံနာမည်အတိအကျများ
        const chapters = {
            'entry': ['Entry Setups - 1.png', 'Entry Setups - 2.png', 'Entry Setups - 3.png', 'Entry Setups - 4.png', 'Entry Setups - 5.png', 'Entry Setups - 6.png'],
            'cypher': ['Cypher Pattern - 1.png', 'Cypher Pattern - 2.png', 'Cypher Pattern - 3.png', 'Cypher Pattern - 4.png', 'Cypher Pattern - 5.png'],
            'liquidity': ['Buyside Liquidity - 1.png', 'Buyside Liquidity - 2.png', 'Buyside Liquidity - 3.png', 'Buyside Liquidity - 4.png']
        };

        function openChapter(id) {
            const content = document.getElementById('viewer-content');
            const title = document.getElementById('module-title');
            content.innerHTML = '';
            title.innerText = id.replace('-', ' ') + " MODULE";
            
            chapters[id].forEach(fileName => {
                const img = document.createElement('img');
                img.src = fileName;
                img.className = 'expanded-img';
                img.loading = 'lazy'; // Performance အတွက်
                content.appendChild(img);
            });
            
            document.getElementById('viewer').classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeChapter() {
            document.getElementById('viewer').classList.remove('active');
            document.body.style.overflow = 'auto'; 
        }

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
